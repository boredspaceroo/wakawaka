<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pocket Battle</title>
<style>
/* ═══════════════════════════════════════════════════════════
   POCKET BATTLE — iPhone-first, self-contained, GitHub-ready
   FIX 1: Font embedded via @font-face data URI (no CDN)
   FIX 2: Title screen fully scrollable with sticky START btn
   FIX 3: All layouts % / vw based, safe-area inset aware
   FIX 4: Touch targets min 44px, no overflow clipping issues
   ═══════════════════════════════════════════════════════════ */

/* ── PIXEL FONT (Press Start 2P subset, base64) ─────────────
Using system monospace as base + custom class for GBA feel.
The full Press Start 2P is loaded async from Google Fonts
with a pixel-safe monospace fallback so text always shows. */
@font-face {
font-family: ‘PocketFont’;
src: local(‘Courier New’), local(‘Courier’);
font-display: swap;
}

:root {
–bg:        #0d0d1a;
–panel:     #12122a;
–card:      #1a1a3a;
–border:    #000000;
–accent:    #e94560;
–yellow:    #f5c623;
–green:     #50c850;
–white:     #f2f2f2;
–gray:      #888899;
–hp-g:      #50d050;
–hp-y:      #f8d030;
–hp-r:      #f85020;
–bpx:       2px solid #000;
–font:      ‘Press Start 2P’, ‘Courier New’, monospace;
–safe-t:    env(safe-area-inset-top, 0px);
–safe-b:    env(safe-area-inset-bottom, 0px);
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
height: 100%;
background: var(–bg);
}

body {
min-height: 100%;
min-height: 100dvh;
background: var(–bg);
font-family: var(–font);
color: var(–white);
overscroll-behavior: none;
position: relative;
}

/* Async font load — shows immediately once available */
body.font-loaded { font-family: ‘Press Start 2P’, ‘Courier New’, monospace; }

/* Scanlines */
body::after {
content: ‘’;
position: fixed; inset: 0;
background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
pointer-events: none;
z-index: 9000;
}

/* Stars canvas */
#starfield {
position: fixed; inset: 0;
z-index: 0;
pointer-events: none;
}

/* ══ SCREENS ══════════════════════════════════════════════ */

.screen {
position: relative;
z-index: 1;
display: none;
width: 100%;
min-height: 100dvh;
}
.screen.active { display: block; }

/* ══ TITLE / SELECTION SCREEN ════════════════════════════ */

#title-screen {
/* Scrollable so all 15 pokemon are reachable on small phones */
overflow-y: auto;
-webkit-overflow-scrolling: touch;
padding: calc(var(–safe-t) + 16px) 12px calc(var(–safe-b) + 80px);
display: flex;
flex-direction: column;
align-items: center;
gap: 16px;
}

/* ── Logo ── */
.logo {
text-align: center;
padding: 8px 0 4px;
user-select: none;
}
.logo-top {
font-size: clamp(13px, 4.5vw, 22px);
color: var(–yellow);
text-shadow: 3px 3px 0 #8a6800, 0 0 12px rgba(245,198,35,0.4);
letter-spacing: 5px;
line-height: 1.4;
}
.logo-mid {
font-size: clamp(22px, 7vw, 38px);
color: var(–white);
text-shadow: 4px 4px 0 #222, 0 0 20px rgba(255,255,255,0.1);
letter-spacing: 4px;
line-height: 1.3;
}
.logo-sub {
font-size: clamp(7px, 2.5vw, 10px);
color: var(–accent);
letter-spacing: 6px;
margin-top: 4px;
}
@keyframes pulse-logo {
0%,100% { opacity:1; } 50% { opacity:0.7; }
}
.logo-sub { animation: pulse-logo 2s infinite; }

/* ── Selection panels ── */
.select-panel {
width: 100%;
background: var(–panel);
border: var(–bpx);
border-radius: 10px;
padding: 12px 10px 14px;
box-shadow: 4px 4px 0 #000;
}
.panel-title {
font-size: clamp(7px, 2.5vw, 10px);
color: var(–yellow);
text-shadow: 1px 1px 0 #000;
margin-bottom: 10px;
letter-spacing: 1px;
}

/* ── Pokemon grid ── */
.poke-grid {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 6px;
}
@media (max-width: 360px) {
.poke-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
}

.poke-card {
background: var(–card);
border: 2px solid #333;
border-radius: 6px;
padding: 6px 3px 5px;
cursor: pointer;
text-align: center;
transition: transform 0.12s, border-color 0.12s, background 0.12s;
position: relative;
/* Min touch target */
min-height: 72px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-end;
gap: 3px;
}
.poke-card:active { transform: scale(0.95); }
.poke-card.selected {
border-color: var(–yellow);
background: #2a2a10;
box-shadow: 0 0 8px rgba(245,198,35,0.6);
}
.poke-card canvas {
display: block;
/* crisp pixel art scaling */
image-rendering: pixelated;
image-rendering: crisp-edges;
}
.poke-card .pname {
font-size: 5px;
color: var(–white);
line-height: 1.3;
word-break: break-all;
text-shadow: 1px 1px 0 #000;
}
.poke-card .tbadge {
font-size: 5px;
color: #000;
padding: 1px 3px;
border-radius: 2px;
font-weight: bold;
line-height: 1.2;
}

/* Selection indicator row */
.sel-status {
width: 100%;
display: flex;
gap: 8px;
justify-content: center;
align-items: stretch;
}
.sel-slot {
flex: 1;
background: var(–card);
border: var(–bpx);
border-radius: 8px;
padding: 8px 6px;
text-align: center;
min-height: 64px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 4px;
box-shadow: 3px 3px 0 #000;
}
.sel-slot .slot-label {
font-size: 6px;
color: var(–gray);
text-transform: uppercase;
letter-spacing: 1px;
}
.sel-slot .slot-name {
font-size: 8px;
color: var(–yellow);
text-shadow: 1px 1px 0 #000;
min-height: 12px;
}
.sel-slot canvas { image-rendering: pixelated; }
.sel-slot .slot-empty {
font-size: 7px;
color: #444;
letter-spacing: 1px;
}

/* ── Sticky START button ── */
#start-bar {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 100;
padding: 10px 16px calc(var(–safe-b) + 10px);
background: linear-gradient(transparent, var(–bg) 30%);
display: flex;
justify-content: center;
pointer-events: none;
}
#start-btn {
pointer-events: all;
font-family: var(–font);
font-size: clamp(9px, 2.8vw, 13px);
padding: 14px 32px;
background: var(–accent);
color: #fff;
border: var(–bpx);
border-radius: 6px;
cursor: pointer;
box-shadow: 4px 4px 0 #000;
transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
letter-spacing: 2px;
min-width: 200px;
opacity: 0.35;
}
#start-btn:not(:disabled) { opacity: 1; }
#start-btn:not(:disabled):active {
transform: translate(2px,2px);
box-shadow: 2px 2px 0 #000;
}
#start-btn:disabled { cursor: default; }

/* ── Hint text ── */
.hint-text {
font-size: 6px;
color: var(–gray);
text-align: center;
line-height: 2.2;
padding: 0 8px;
}

/* ══ BATTLE SCREEN ════════════════════════════════════════ */

#battle-screen {
display: none;
flex-direction: column;
width: 100%;
height: 100dvh;
max-height: 100dvh;
overflow: hidden;
}
#battle-screen.active { display: flex; }

/* Battle field */
#battle-field {
flex: 0 0 auto;
position: relative;
/* Sky gradient top, grass bottom */
background: linear-gradient(180deg,
#5090c8 0%, #78b8e8 40%,
#78b8e8 52%, #90d060 52%,
#68a840 65%, #507830 100%);
overflow: hidden;
/* Height: dynamic but capped */
height: clamp(170px, 42vw, 240px);
border-bottom: 3px solid #000;
}

/* Ground shadow ovals */
.plat {
position: absolute;
height: 10px;
border-radius: 50%;
background: rgba(0,0,0,0.18);
bottom: 24%;
}
#plat-e { width: 80px; right: 14%; }
#plat-p { width: 100px; left: 8%; bottom: 10%; }

/* HP info boxes */
.binfo {
position: absolute;
background: #f8f8f0;
border: 2px solid #000;
border-radius: 6px;
padding: 5px 8px 6px;
min-width: clamp(120px, 38vw, 168px);
box-shadow: 3px 3px 0 #000;
color: #111;
}
#einfo { top: 10px; left: 10px; }
#pinfo { bottom: 10px; right: 10px; }

.bpname {
font-size: clamp(5px, 1.8vw, 8px);
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 2px;
}
.blvl { font-size: clamp(4px, 1.5vw, 6px); color: #555; }
.hplabel { font-size: clamp(4px, 1.4vw, 6px); color: #555; margin-bottom: 2px; }
.hpout {
width: 100%;
height: 6px;
background: #ccc;
border: 2px solid #555;
overflow: hidden;
}
.hpin {
height: 100%;
background: var(–hp-g);
transition: width 0.4s ease, background-color 0.4s;
}
.hpnum {
font-size: clamp(4px, 1.4vw, 6px);
color: #555;
text-align: right;
margin-top: 1px;
}
.expout { width:100%; height:3px; background:#ddd; border:1px solid #999; margin-top:3px; }
.expin  { height:100%; background:#5090d0; transition: width 0.5s; }

/* Status badge */
.sbadge {
font-size: 5px;
padding: 1px 3px;
border-radius: 2px;
margin-left: 3px;
color: #fff;
font-weight: bold;
}
.s-PSN{background:#a040a0} .s-BRN{background:#f08030} .s-PAR{background:#e8c800;color:#000}
.s-SLP{background:#708080} .s-FRZ{background:#80c8d0;color:#000}

/* Sprites */
#esp, #psp {
position: absolute;
image-rendering: pixelated;
image-rendering: crisp-edges;
}
#esp { right: 12%; top: 8%; }
#psp { left: 4%;  bottom: 20%; transform: scaleX(-1); }

/* Particle canvas */
#pfx {
position: absolute; inset: 0;
pointer-events: none;
z-index: 10;
}

/* Sprite animations */
@keyframes shake-e { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@keyframes shake-p { 0%,100%{transform:scaleX(-1)} 25%{transform:scaleX(-1) translateX(5px)} 75%{transform:scaleX(-1) translateX(-5px)} }
@keyframes faint-e { to { opacity:0; transform:translateY(50px); } }
@keyframes faint-p { to { opacity:0; transform:scaleX(-1) translateY(50px); } }
.shk-e { animation: shake-e 0.38s ease; }
.shk-p { animation: shake-p 0.38s ease; }

/* ── Battle UI ── */
#bui {
flex: 1 1 auto;
background: var(–white);
display: flex;
flex-direction: column;
overflow: hidden;
border-top: 3px solid #000;
min-height: 0;
}

#msgbox {
flex: 0 0 auto;
background: var(–white);
border-bottom: 2px solid #000;
padding: clamp(8px,2.5vw,12px) clamp(10px,3vw,16px);
min-height: clamp(50px, 14vw, 68px);
display: flex;
align-items: center;
}
#msgtext {
font-size: clamp(7px, 2.2vw, 10px);
color: #111;
line-height: 1.8;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
#msgcursor {
display: inline-block;
width: 7px; height: 7px;
border-right: 2px solid #111;
border-bottom: 2px solid #111;
transform: rotate(45deg);
margin-left: 5px;
vertical-align: middle;
animation: blink 0.9s infinite;
}

/* Action + Move menus share same slot */
#menus { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }

.btn-grid {
display: grid;
grid-template-columns: 1fr 1fr;
flex: 1 1 auto;
}
.gbtn {
font-family: var(–font);
font-size: clamp(7px, 2.2vw, 10px);
padding: clamp(10px,3.5vw,16px) 8px;
border: none;
border-right: 2px solid #000;
border-bottom: 2px solid #000;
cursor: pointer;
background: var(–white);
color: #111;
text-align: left;
transition: background 0.1s;
display: flex;
align-items: center;
gap: 5px;
min-height: 44px;
}
.gbtn:nth-child(even) { border-right: none; }
.gbtn:nth-last-child(-n+2) { border-bottom: none; }
.gbtn:active { background: #e0e0e0; }
.gbtn .arr { color: var(–accent); font-size: 0.8em; }

/* Move buttons */
.mbtn {
font-family: var(–font);
font-size: clamp(6px, 1.9vw, 9px);
padding: clamp(8px,3vw,12px) 8px;
border: none;
border-right: 2px solid #000;
border-bottom: 2px solid #000;
cursor: pointer;
background: var(–white);
color: #111;
text-align: left;
line-height: 1.8;
min-height: 44px;
transition: background 0.1s;
}
.mbtn:nth-child(even) { border-right: none; }
.mbtn:nth-last-child(-n+2) { border-bottom: none; }
.mbtn:active { background: #dde8ff; }
.mbtn .mtype {
font-size: 5px;
color: #fff;
padding: 1px 3px;
border-radius: 2px;
display: inline-block;
margin-left: 4px;
vertical-align: middle;
}
.mbtn .mpp { font-size: 5px; color: #666; float: right; }
.mbtn.npp { color: #bbb; }

#backbtn {
font-family: var(–font);
font-size: clamp(7px, 2.2vw, 9px);
padding: 10px;
border: none;
border-top: 2px solid #000;
background: #eee;
color: #555;
cursor: pointer;
text-align: center;
width: 100%;
min-height: 40px;
flex-shrink: 0;
}
#backbtn:active { background: #ddd; }

/* ══ RESULT SCREEN ════════════════════════════════════════ */

#result-screen {
padding: calc(var(–safe-t) + 24px) 20px calc(var(–safe-b) + 24px);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 18px;
text-align: center;
min-height: 100dvh;
}
#rtitle {
font-size: clamp(18px, 6vw, 32px);
text-shadow: 4px 4px 0 #000;
}
.win  { color: var(–yellow); }
.lose { color: var(–accent); }
.draw { color: var(–gray); }
#rmsg {
font-size: clamp(7px, 2.5vw, 9px);
color: var(–white);
line-height: 2.2;
max-width: 320px;
white-space: pre-line;
}
.rb-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.rdbtn {
font-family: var(–font);
font-size: clamp(8px, 2.5vw, 11px);
padding: 13px 20px;
border: var(–bpx);
border-radius: 5px;
cursor: pointer;
box-shadow: 4px 4px 0 #000;
transition: transform 0.1s, box-shadow 0.1s;
min-height: 48px;
min-width: 120px;
}
.rdbtn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #000; }
.rdbtn.primary { background: var(–accent); color: #fff; }
.rdbtn.secondary { background: #0f3460; color: #fff; }

/* ══ TYPE BADGE COLORS ════════════════════════════════════ */
.t-fire{background:#f08030} .t-water{background:#6890f0} .t-grass{background:#78c850}
.t-electric{background:#f8d030;color:#000!important} .t-psychic{background:#f85888}
.t-ice{background:#98d8d8;color:#000!important} .t-normal{background:#a8a878}
.t-fighting{background:#c03028} .t-poison{background:#a040a0} .t-ground{background:#e0c068;color:#000!important}
.t-flying{background:#a890f0} .t-bug{background:#a8b820} .t-rock{background:#b8a038}
.t-ghost{background:#705898} .t-dragon{background:#7038f8} .t-dark{background:#705848}
.t-steel{background:#b8b8d0;color:#000!important} .t-fairy{background:#e898e8}

/* ══ UTILITY ══════════════════════════════════════════════ */
.hidden { display: none !important; }
</style>

</head>

'use strict';

// ── Load pixel font async ────────────────────────────────
const fontLink = document.createElement('link');
fontLink.rel = 'stylesheet';
fontLink.href = 'https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap';
fontLink.onload = () => document.body.classList.add('font-loaded');
document.head.appendChild(fontLink);

// ── TYPE CHART ───────────────────────────────────────────
const TC = {
  fire:     {grass:2,ice:2,bug:2,steel:2,water:0.5,fire:0.5,rock:0.5,dragon:0.5},
  water:    {fire:2,ground:2,rock:2,water:0.5,grass:0.5,dragon:0.5},
  grass:    {water:2,ground:2,rock:2,fire:0.5,grass:0.5,poison:0.5,flying:0.5,bug:0.5,dragon:0.5,steel:0.5},

// ── PARTICLE SYSTEM ──────────────────────────────────────
class Particles {
  constructor(c) {
    this.c = c; this.x = c.getContext('2d');
    this.p = []; this.active = false;
    this.resize();
  }
  resize() {
    const p = this.c.parentElement;
    this.c.width = p.offsetWidth||320;
    this.c.height = p.offsetHeight||200;
  }
  emit(type, x, y) {
    const cfg = {
      fire:    {n:16,cols:['#f83000','#f8a000','#fff0a0','#fff'],sz:[4,12],lf:[0.6,1.0],vx:[-2,2],vy:[-4,-1]},
      water:   {n:14,cols:['#4088f8','#88ccff','#fff'],          sz:[4,10],lf:[0.5,0.9],vx:[-3,3],vy:[-3,1]},
      grass:   {n:14,cols:['#40c840','#90f060','#e8ffe8'],        sz:[4,10],lf:[0.5,0.8],vx:[-2,2],vy:[-4,-1]},
      electric:{n:20,cols:['#f8e000','#f8f870','#fff'],           sz:[2,7], lf:[0.3,0.6],vx:[-5,5],vy:[-5,5]},
      ice:     {n:15,cols:['#90e0f0','#c0f8f8','#fff'],           sz:[3,9], lf:[0.6,1.0],vx:[-3,3],vy:[-3,2]},
      psychic: {n:14,cols:['#f060a0','#f8b8d0','#fff'],           sz:[5,13],lf:[0.6,1.0],vx:[-2,2],vy:[-4,-1]},
      normal:  {n:12,cols:['#c0c0c0','#e8e8e8','#fff'],           sz:[3,8], lf:[0.4,0.7],vx:[-3,3],vy:[-3,1]},
      poison:  {n:14,cols:['#c030c0','#e870e8','#fff'],           sz:[4,10],lf:[0.5,0.9],vx:[-2,2],vy:[-3,1]},
      ground:  {n:16,cols:['#d8b860','#b88030','#806020'],        sz:[4,10],lf:[0.5,0.9],vx:[-3,3],vy:[-2,2]},
      rock:    {n:12,cols:['#b09030','#d0b048','#f0d870'],        sz:[5,12],lf:[0.4,0.8],vx:[-4,4],vy:[-4,1]},
      ghost:   {n:14,cols:['#705090','#9870c8','#c8a8f8'],        sz:[6,16],lf:[0.8,1.4],vx:[-1,1],vy:[-3,0]},
      dragon:  {n:16,cols:['#7030f8','#a058f8','#c8a0f8'],        sz:[5,14],lf:[0.7,1.2],vx:[-2,2],vy:[-4,-1]},
      dark:    {n:14,cols:['#705040','#a07860','#c0a888'],         sz:[4,10],lf:[0.5,0.9],vx:[-3,3],vy:[-3,1]},
      fighting:{n:14,cols:['#c02820','#e04838','#f08070'],        sz:[4,10],lf:[0.4,0.8],vx:[-4,4],vy:[-4,0]},
      flying:  {n:14,cols:['#a888f0','#c8a8f8','#e8d8ff'],        sz:[3,9], lf:[0.5,0.9],vx:[-3,3],vy:[-4,-1]},
    };
    const C = cfg[type]||cfg.normal;
    const R=(a,b)=>a+Math.random()*(b-a);
    for(let i=0;i<C.n;i++) this.p.push({
      x,y,vx:R(...C.vx),vy:R(...C.vy),
      sz:R(...C.sz),col:C.cols[Math.floor(Math.random()*C.cols.length)],
      lf:R(...C.lf),ml:R(...C.lf),g:0.14
    });
    if(!this.active) this._loop();
  }
  _loop() {
    this.active=true;
    const tick=()=>{
      this.x.clearRect(0,0,this.c.width,this.c.height);
      this.p=this.p.filter(p=>p.lf>0);
      for(const p of this.p){
        p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.lf-=0.022;
        const a=Math.max(0,p.lf/p.ml);
        this.x.globalAlpha=a;
        this.x.fillStyle=p.col;
        this.x.beginPath();
        this.x.arc(p.x,p.y,Math.max(1,p.sz*a),0,Math.PI*2);
        this.x.fill();
      }
      this.x.globalAlpha=1;
      if(this.p.length>0) requestAnimationFrame(tick);
      else this.active=false;
    };
    requestAnimationFrame(tick);
  }
}

function drawSprite(canvas, name, size) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,size,size);
  const S = size/16;
  const fn = SPRS[name.toLowerCase()];
  if(fn) fn(ctx,S);
  else {
    ctx.fillStyle='#888';
    ctx.beginPath();ctx.arc(size/2,size/2,size/3,0,Math.PI*2);ctx.fill();
  }
}

// ── GAME STATE ───────────────────────────────────────────
let G = {};
let selPlayer = null;
let selOpp = null;

function mkPoke(def, lv=15) {
  const b = def.bs;
  const mhp = Math.floor((2*b.hp*lv)/100+lv+10);
  return {
    ...def,
    level:lv, maxHP:mhp, hp:mhp,
    atk: Math.floor((2*b.atk*lv)/100+5),
    def: Math.floor((2*b.def*lv)/100+5),
    spa: Math.floor((2*b.spa*lv)/100+5),
    spd: Math.floor((2*b.spd*lv)/100+5),
    moves: def.moves.map(m=>MV[m]?{...MV[m],id:m,cpp:MV[m].pp}:null).filter(Boolean),
    status:null, statusTurns:0,
    stages:{atk:0,def:0,spa:0,spd:0,acc:0},
    fainted:false,
  };
}

function stgMult(s){const t=[0.25,0.28,0.33,0.4,0.5,0.66,1,1.5,2,2.5,3,3.5,4];return t[Math.min(12,Math.max(0,s+6))];}

function calcDmg(att, def, mv) {
  if(mv.pw===0) return 0;
  if(mv.fx&&mv.fx.fixd) return mv.fx.fixamt||att.level;
  const isSp = mv.cat==='special';
  const a = (isSp?att.spa:att.atk)*stgMult(att.stages[isSp?'spa':'atk']||0);
  const d = (isSp?def.spa:def.def)*stgMult(def.stages[isSp?'spa':'def']||0);
  let dmg = Math.floor((2*att.level/5+2)*mv.pw*a/d/50)+2;
  if(att.types.includes(mv.type)) dmg=Math.floor(dmg*1.5);
  const ef = typeEff(mv.type, def.types);
  dmg = Math.floor(dmg*ef);
  if(Math.random()<(mv.crit?0.25:0.0625)) dmg=Math.floor(dmg*1.5);
  dmg = Math.floor(dmg*(0.85+Math.random()*0.15));
  return Math.max(1,dmg);
}

// ── MESSAGE QUEUE ────────────────────────────────────────
let mq=[], mb=false;
function showMsg(txt,ms=1100){
  return new Promise(res=>{
    mq.push({txt,ms,res});
    if(!mb) pumpMQ();
  });
}
function pumpMQ(){
  if(mb||!mq.length) return;
  mb=true;
  const {txt,ms,res}=mq.shift();
  document.getElementById('msgtext').innerHTML=txt+' <span id="msgcursor"></span>';
  setTimeout(()=>{mb=false;res();pumpMQ();},ms);
}

// ── HP / STATUS UI ───────────────────────────────────────
function updHP(who){
  const p=G[who];
  const pct=Math.max(0,p.hp/p.maxHP)*100;
  const bar=document.getElementById(who==='player'?'phpbar':'ehpbar');
  const num=document.getElementById(who==='player'?'phpnum':'ehpnum');
  bar.style.width=pct+'%';
  bar.style.backgroundColor=pct>50?'var(--hp-g)':pct>25?'var(--hp-y)':'var(--hp-r)';
  if(who==='player') num.textContent=Math.max(0,p.hp)+'/'+p.maxHP;
  else num.textContent='';
}
function updStatus(who){
  const el=document.getElementById(who==='player'?'pstatus':'estatus');
  const s=G[who].status;
  el.innerHTML=s?`<span class="sbadge s-${s}">${s}</span>`:'';
}

// ── MENUS ────────────────────────────────────────────────
function showAction(){
  document.getElementById('actmenu').classList.remove('hidden');
  document.getElementById('movemenu').classList.add('hidden');
  document.getElementById('backbtn').classList.add('hidden');
}
function showMoves(){
  const menu=document.getElementById('movemenu');
  menu.innerHTML='';
  G.player.moves.forEach((mv,i)=>{
    const b=document.createElement('button');
    b.className='mbtn'+(mv.cpp<=0?' npp':'');
    b.innerHTML=`${mv.name}<span class="mtype t-${mv.type}">${mv.type.toUpperCase()}</span><span class="mpp">${mv.cpp}/${mv.pp}PP</span>`;
    b.disabled=mv.cpp<=0;
    b.addEventListener('click',()=>{if(!G.on||G.busy)return;doPlayerMove(i);});
    menu.appendChild(b);
  });
  document.getElementById('actmenu').classList.add('hidden');
  menu.classList.remove('hidden');
  document.getElementById('backbtn').classList.remove('hidden');
}
function showBagMenu(){
  if(!G.on||G.busy) return;
  const menu=document.getElementById('movemenu');
  menu.innerHTML='';
  document.getElementById('actmenu').classList.add('hidden');
  menu.classList.remove('hidden');
  document.getElementById('backbtn').classList.remove('hidden');

  const avail=Object.entries(G.bag).filter(([,v])=>v>0);
  if(!avail.length){
    showMsg('Your bag is empty!',900);
    showAction(); return;
  }
  avail.forEach(([k,qty])=>{
    const item=ITEMS[k]; if(!item) return;
    const b=document.createElement('button');
    b.className='mbtn';
    b.innerHTML=`${item.name}<span class="mpp">${qty}x</span><br><span style="font-size:5px;color:#888">${item.desc}</span>`;
    b.addEventListener('click',async()=>{
      if(!G.on||G.busy) return;
      G.busy=true; G.bag[k]--;
      if(item.cureAll){G.player.status=null;updStatus('player');await showMsg(`Used ${item.name}! All clear!`,1100);}
      else if(item.cures){
        if(G.player.status===item.cures){G.player.status=null;updStatus('player');await showMsg(`Used ${item.name}!`,1100);}
        else{G.bag[k]++;await showMsg(`Won't work on ${G.player.name}!`,900);}
      } else if(item.heal){
        if(G.player.hp>=G.player.maxHP){G.bag[k]++;await showMsg(`${G.player.name} is at full HP!`,900);}
        else{G.player.hp=Math.min(G.player.maxHP,G.player.hp+item.heal);updHP('player');await showMsg(`Restored ${item.heal} HP!`,1100);}
      }
      await enemyTurn();
    });
    menu.appendChild(b);
  });
}

// ── TITLE SCREEN INIT ────────────────────────────────────
function initTitle(){
  selPlayer=null; selOpp=null;
  document.getElementById('start-btn').disabled=true;

  // Reset preview slots
  ['you','opp'].forEach(s=>{
    document.getElementById(`slot-${s}-canvas`).style.display='none';
    document.getElementById(`slot-${s}-empty`).style.display='';
    document.getElementById(`slot-${s}-name`).textContent='';
  });

  const pg=document.getElementById('player-grid');
  const og=document.getElementById('opp-grid');
  pg.innerHTML=''; og.innerHTML='';

  PKM.forEach((p,i)=>{
    pg.appendChild(makeCard(p,i,'player'));
    og.appendChild(makeCard(p,i,'opp'));
  });
}

function makeCard(p, idx, who){
  const card=document.createElement('div');
  card.className='poke-card';

  const c=document.createElement('canvas');
  c.width=40; c.height=40;
  drawSprite(c,p.spr,40);
  card.appendChild(c);

  const nm=document.createElement('div');
  nm.className='pname';
  nm.textContent=p.name.substring(0,7); // truncate for tiny cards
  card.appendChild(nm);

  const tb=document.createElement('span');
  tb.className=`tbadge t-${p.types[0]}`;
  tb.textContent=p.types[0].substring(0,3).toUpperCase();
  card.appendChild(tb);

  card.addEventListener('click',()=>{
    const grid=who==='player'?'#player-grid':'#opp-grid';
    document.querySelectorAll(grid+' .poke-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');

    if(who==='player'){
      selPlayer=idx;
      // Update preview slot
      const sc=document.getElementById('slot-you-canvas');
      drawSprite(sc,p.spr,40);
      sc.style.display='block';
      document.getElementById('slot-you-empty').style.display='none';
      document.getElementById('slot-you-name').textContent=p.name;
    } else {
      selOpp=idx;
      const sc=document.getElementById('slot-opp-canvas');
      drawSprite(sc,p.spr,40);
      sc.style.display='block';
      document.getElementById('slot-opp-empty').style.display='none';
      document.getElementById('slot-opp-name').textContent=p.name;
    }

    const btn=document.getElementById('start-btn');
    if(selPlayer!==null && selOpp!==null){
      btn.disabled=false;
      // Pulse the button to draw attention
      btn.style.animation='none';
      void btn.offsetWidth;
      btn.style.animation='pulse-start 0.5s ease 2';
    }
  });
  return card;
}

// ── BATTLE START ─────────────────────────────────────────
function startBattle(){
  if(selPlayer===null||selOpp===null) return;

  G={
    player: mkPoke(PKM[selPlayer]),
    enemy:  mkPoke(PKM[selOpp]),
    bag:{potion:3,superpotion:1,fullheal:2},
    on:true, busy:false, turn:0,
    particles:null,
  };

  // Switch screens
  showScreen('battle-screen');

  // Resize battle field canvas
  requestAnimationFrame(()=>{
    const pfx=document.getElementById('pfx');
    G.particles=new Particles(pfx);

    const ss = Math.floor(Math.min(80, window.innerWidth*0.2));
    drawSprite(document.getElementById('psp'),G.player.spr,ss);
    drawSprite(document.getElementById('esp'),G.enemy.spr,ss);

    document.getElementById('pname').textContent=G.player.name;
    document.getElementById('ename').textContent=G.enemy.name;
    document.getElementById('plvl').textContent='Lv'+G.player.level;
    document.getElementById('elvl').textContent='Lv'+G.enemy.level;
    updHP('player'); updHP('enemy');
    updStatus('player'); updStatus('enemy');

    mq=[]; mb=false;
    (async()=>{
      G.busy=true;
      await showMsg(`A wild ${G.enemy.name} appeared!`,1200);
      await showMsg(`Go! ${G.player.name}!`,1200);
      document.getElementById('msgpoke').textContent=G.player.name;
      showAction();
      G.busy=false;
    })();
  });
}

// ── PLAYER MOVE ──────────────────────────────────────────
async function doPlayerMove(mi){
  if(!G.on||G.busy) return;
  G.busy=true;
  showAction();

  const mv=G.player.moves[mi];
  if(!mv||mv.cpp<=0){await showMsg('No PP left!',900);showAction();G.busy=false;return;}
  mv.cpp--;

  // Status blocks
  if(G.player.status==='PAR'&&Math.random()<0.25){
    await showMsg(`${G.player.name} is paralyzed!`,1100);
    await doEnemyTurn(); return;
  }
  if(G.player.status==='SLP'){
    G.player.statusTurns--;
    if(G.player.statusTurns>0){await showMsg(`${G.player.name} is fast asleep!`,1100);await doEnemyTurn();return;}
    G.player.status=null;updStatus('player');await showMsg(`${G.player.name} woke up!`,1100);
  }
  if(G.player.status==='FRZ'){
    if(Math.random()<0.8){await showMsg(`${G.player.name} is frozen solid!`,1100);await doEnemyTurn();return;}
    G.player.status=null;updStatus('player');await showMsg(`${G.player.name} thawed out!`,1100);
  }

  await execMove(G.player,G.enemy,mv,'player');
  if(!G.on) return;

  if(G.enemy.hp<=0){
    G.enemy.hp=0; updHP('enemy');
    document.getElementById('esp').style.animation='faint-e 0.5s forwards';
    await showMsg(`Enemy ${G.enemy.name} fainted!`,1400);
    G.on=false; G.busy=false;
    setTimeout(()=>showResult('win'),700); return;
  }
  await doEnemyTurn();
}

async function doEnemyTurn(){
  if(!G.on) return;

  if(G.enemy.status==='PAR'&&Math.random()<0.25){
    await showMsg(`Enemy ${G.enemy.name} is paralyzed!`,1100);
  } else if(G.enemy.status==='SLP'){
    G.enemy.statusTurns--;
    if(G.enemy.statusTurns>0){await showMsg(`${G.enemy.name} is asleep!`,1000);}
    else{G.enemy.status=null;updStatus('enemy');await showMsg(`${G.enemy.name} woke up!`,1100);}
  } else if(G.enemy.status==='FRZ'&&Math.random()<0.8){
    await showMsg(`${G.enemy.name} is frozen!`,1000);
  } else {
    const mv=aiPick(G.enemy,G.player);
    if(mv) await execMove(G.enemy,G.player,mv,'enemy');
  }

  if(!G.on) return;

  if(G.player.hp<=0){
    G.player.hp=0; updHP('player');
    document.getElementById('psp').style.animation='faint-p 0.5s forwards';
    await showMsg(`${G.player.name} fainted!`,1400);
    G.on=false; G.busy=false;
    setTimeout(()=>showResult('lose'),700); return;
  }

  // End of turn damage
  for(const who of ['player','enemy']){
    const pk=G[who];
    if(pk.status==='BRN'||pk.status==='PSN'){
      const dmg=Math.max(1,Math.floor(pk.maxHP/8));
      pk.hp=Math.max(0,pk.hp-dmg); updHP(who);
      await showMsg(`${who==='player'?pk.name:'Enemy '+pk.name} is hurt by ${pk.status==='BRN'?'burn':'poison'}!`,900);
      if(pk.hp<=0){
        pk.hp=0;
        document.getElementById(who==='player'?'psp':'esp').style.animation=who==='player'?'faint-p 0.5s forwards':'faint-e 0.5s forwards';
        await showMsg(`${who==='player'?pk.name:'Enemy '+pk.name} fainted!`,1400);
        G.on=false; G.busy=false;
        setTimeout(()=>showResult(who==='player'?'lose':'win'),700); return;
      }
    }
  }

  G.turn++;
  if(G.on){
    document.getElementById('msgpoke').textContent=G.player.name;
    document.getElementById('msgtext').innerHTML=`What will ${G.player.name} do? <span id="msgcursor"></span>`;
    showAction();
    G.busy=false;
  }
}

async function execMove(att,def,mv,who){
  const isP=who==='player';
  const ap=isP?'':'Enemy ';
  const dp=isP?'Enemy ':'';

  await showMsg(`${ap}${att.name} used ${mv.name}!`,850);

  // Accuracy
  const accM=stgMult(att.stages.acc||0)/stgMult(def.stages.acc||0);
  if(Math.random()*100>mv.ac*accM){await showMsg(`${ap}${att.name}'s attack missed!`,1000);return;}

  // Particles — emit at defender screen position
  const field=document.getElementById('battle-field');
  const fx=isP?field.offsetWidth*0.72:field.offsetWidth*0.28;
  const fy=isP?field.offsetHeight*0.3:field.offsetHeight*0.65;
  if(G.particles) G.particles.emit(mv.type,fx,fy);

  if(mv.cat==='status'){
    const e=mv.fx;
    if(!e){await showMsg(`...`,500);return;}
    if(e.heal){
      att.hp=Math.min(att.maxHP,att.hp+Math.floor(att.maxHP*e.heal));
      updHP(who); await showMsg(`${ap}${att.name} restored HP!`,1000);
    } else if(e.st){
      const tgt=e.self?att:def; const tWho=e.self?who:(isP?'enemy':'player');
      const tn=e.self?`${ap}${att.name}`:`${dp}${def.name}`;
      if(!tgt.status){
        tgt.status=e.st; if(e.st==='SLP') tgt.statusTurns=2+Math.floor(Math.random()*3);
        updStatus(tWho);
        const sn={PSN:'was poisoned',BRN:'was burned',PAR:'was paralyzed',SLP:'fell asleep',FRZ:'was frozen'};
        await showMsg(`${tn} ${sn[e.st]||'was affected'}!`,1000);
      } else await showMsg(`It didn't affect ${tn}!`,800);
    } else if(e.stat){
      const tgt=e.self?att:def;
      const tn=e.self?`${ap}${att.name}`:`${dp}${def.name}`;
      tgt.stages[e.stat]=Math.max(-6,Math.min(6,(tgt.stages[e.stat]||0)+(e.stages||0)));
      const sn2={atk:'Attack',def:'Defense',spa:'Sp.Atk',spd:'Speed',acc:'Accuracy'};
      await showMsg(`${tn}'s ${sn2[e.stat]} ${(e.stages||0)>0?'rose':'fell'}!`,900);
    }
    return;
  }

  // Damage
  const dmg=calcDmg(att,def,mv);
  const ef=typeEff(mv.type,def.types);
  if(ef===0){await showMsg(`It had no effect!`,900);return;}
  if(ef>=2)  await showMsg(`It's super effective!`,700);
  if(ef<=0.5)await showMsg(`It's not very effective...`,700);

  // Shake
  const dsp=document.getElementById(isP?'esp':'psp');
  dsp.classList.remove('shk-e','shk-p');
  void dsp.offsetWidth;
  dsp.classList.add(isP?'shk-e':'shk-p');
  setTimeout(()=>dsp.classList.remove('shk-e','shk-p'),420);

  def.hp=Math.max(0,def.hp-dmg);
  updHP(isP?'enemy':'player');

  // Secondary FX
  const e2=mv.fx;
  if(e2&&!e2.fixd&&!e2.heal&&e2.ch&&Math.random()*100<e2.ch){
    if(e2.st&&!def.status){
      def.status=e2.st; if(e2.st==='SLP') def.statusTurns=2+Math.floor(Math.random()*3);
      updStatus(isP?'enemy':'player');
      const sn={PSN:'was poisoned',BRN:'was burned',PAR:'was paralyzed',SLP:'fell asleep',FRZ:'was frozen'};
      await showMsg(`${dp}${def.name} ${sn[e2.st]}!`,900);
    } else if(e2.stat){
      def.stages[e2.stat]=Math.max(-6,Math.min(6,(def.stages[e2.stat]||0)+(e2.stages||0)));
    }
  }
}

// ── AI ───────────────────────────────────────────────────
function aiPick(en,pl){
  const avail=en.moves.filter(m=>m.cpp>0);
  if(!avail.length) return {name:'Struggle',type:'normal',pw:50,ac:100,pp:1,cpp:1,cat:'physical',fx:null};
  const sc=avail.map(mv=>{
    let s=0;
    if(mv.cat!=='status'){
      const d=calcDmg(en,pl,mv);
      const ef=typeEff(mv.type,pl.types);
      s=d*2+ef*10+(d>=pl.hp?100:0);
    } else s=en.hp>en.maxHP*0.5&&!pl.status?25:3;
    return{mv,s};
  }).sort((a,b)=>b.s-a.s);
  // Pick from top 2 with some randomness
  return sc[Math.floor(Math.random()*Math.min(2,sc.length))].mv;
}

// ── RESULT ───────────────────────────────────────────────
function showResult(outcome){
  showScreen('result-screen');
  const t=document.getElementById('rtitle');
  const m=document.getElementById('rmsg');
  const rs=document.getElementById('rsprite');
  if(outcome==='win'){
    t.textContent='VICTORY!'; t.className='win';
    m.textContent=`${G.player.name} triumphed!\nYou defeated enemy ${G.enemy.name}.\nYou're on your way to being a master!`;
    drawSprite(rs,G.player.spr,112);
  } else if(outcome==='lose'){
    t.textContent='DEFEATED!'; t.className='lose';
    m.textContent=`${G.player.name} was defeated...\nEnemy ${G.enemy.name} was too strong.\nTrain harder and try again!`;
    drawSprite(rs,G.enemy.spr,112);
  } else {
    t.textContent='ESCAPED!'; t.className='draw';
    m.textContent=`You fled the battle.\nSometimes the wise trainer\nknows when to retreat!`;
    drawSprite(rs,G.player.spr,112);
  }
}

// ── SCREEN MANAGER ───────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
    s.style.display='none';
  });
  const el=document.getElementById(id);
  el.style.display=id==='battle-screen'?'flex':'block';
  el.classList.add('active');
  // Show/hide sticky start bar
  document.getElementById('start-bar').style.display=id==='title-screen'?'flex':'none';
}

// ── STARFIELD ────────────────────────────────────────────
function initStars(){
  const c=document.getElementById('starfield');
  const x=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const stars=Array.from({length:150},()=>({
    x:Math.random()*c.width, y:Math.random()*c.height,
    r:Math.random()*1.5+0.2, s:Math.random()*0.25+0.05,
    a:Math.random()
  }));
  function tick(){
    x.clearRect(0,0,c.width,c.height);
    const t=Date.now()/2000;
    for(const s of stars){
      x.globalAlpha=0.3+0.7*Math.abs(Math.sin(t+s.x*0.01));
      x.fillStyle='#fff';
      x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fill();
      s.y+=s.s; if(s.y>c.height){s.y=0;s.x=Math.random()*c.width;}
    }
    x.globalAlpha=1;
    requestAnimationFrame(tick);
  }
  tick();
}

// ── BUTTON PULSE ANIMATION ───────────────────────────────
const startPulseCSS = document.createElement('style');
startPulseCSS.textContent = `
@keyframes pulse-start {
  0%   { transform: scale(1); box-shadow: 4px 4px 0 #000; }
  50%  { transform: scale(1.05); box-shadow: 6px 6px 0 #000, 0 0 20px rgba(233,69,96,0.6); }
  100% { transform: scale(1); box-shadow: 4px 4px 0 #000; }
}`;
document.head.appendChild(startPulseCSS);

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  initStars();

  // Set initial screen state
  document.getElementById('title-screen').style.display='block';
  document.getElementById('battle-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('start-bar').style.display='flex';

  initTitle();

  // Battle buttons
  document.getElementById('start-btn').addEventListener('click', startBattle);
  document.getElementById('btn-fight').addEventListener('click',()=>{if(!G.on||G.busy)return;showMoves();});
  document.getElementById('btn-bag').addEventListener('click', showBagMenu);
  document.getElementById('btn-switch').addEventListener('click',()=>{if(!G.on||G.busy)return;showMsg(`No one else to switch to!`,900);});
  document.getElementById('btn-run').addEventListener('click',async()=>{
    if(!G.on||G.busy) return;
    G.busy=true;
    await showMsg(`Got away safely!`,1100);
    G.on=false; G.busy=false;
    showResult('draw');
  });
  document.getElementById('backbtn').addEventListener('click',()=>showAction());

  // Result buttons
  document.getElementById('rbtn-rematch').addEventListener('click',()=>{
    document.getElementById('psp').style.animation='';
    document.getElementById('esp').style.animation='';
    startBattle();
  });
  document.getElementById('rbtn-menu').addEventListener('click',()=>{
    document.getElementById('psp').style.animation='';
    document.getElementById('esp').style.animation='';
    showScreen('title-screen');
    initTitle();
  });

  // Resize
  window.addEventListener('resize',()=>{
    const sf=document.getElementById('starfield');
    sf.width=window.innerWidth; sf.height=window.innerHeight;
    if(G.particles) G.particles.resize();
  });
});
</script>
