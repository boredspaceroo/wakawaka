<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TokeBeast</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block">
<style>
@font-face {
  font-family: 'Press Start 2P';
  font-style: normal;
  font-weight: 400;
  font-display: block;
  src: url(https://fonts.gstatic.com/s/pressstart2p/v15/ZLfdm8T8TB6MgYgMbzNfAFcMdo.woff2) format('woff2'),
       url(https://fonts.gstatic.com/s/pressstart2p/v15/ZLfdm8T8TB6MgYgMbzNfAFc.woff) format('woff');
}
:root {
  --bg:#0d0d1a; --panel:#12122a; --card:#1a1a3a;
  --accent:#e94560; --yellow:#f5c623; --white:#f2f2f2; --gray:#888899;
  --hp-g:#50d050; --hp-y:#f8d030; --hp-r:#f85020;
  --font:'Press Start 2P','Courier New',Courier,monospace;
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px); --safe-r:env(safe-area-inset-right,0px);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; touch-action:manipulation; }
html,body { width:100%; height:100%; background:var(--bg); font-family:var(--font); color:var(--white); overscroll-behavior:none; -webkit-overflow-scrolling:touch; }
body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px); pointer-events:none; z-index:9000; }
#starfield { position:fixed; inset:0; z-index:0; pointer-events:none; }
.screen { position:relative; z-index:1; width:100%; display:none; }
.screen.active { display:block; }
#battle-screen.active { display:flex; flex-direction:column; }

/* TITLE */
#title-screen { min-height:100dvh; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:calc(var(–safe-t) + 14px) calc(var(–safe-r) + 12px) calc(var(–safe-b) + 92px) calc(var(–safe-l) + 12px); display:flex; flex-direction:column; align-items:center; gap:14px; }
.logo { text-align:center; user-select:none; }
.logo-name { font-size:clamp(24px,7.5vw,44px); color:var(–yellow); text-shadow:4px 4px 0 #7a5800,0 0 20px rgba(245,198,35,.5); letter-spacing:2px; line-height:1.2; }
.logo-sub  { font-size:clamp(7px,2.3vw,10px); color:var(–accent); letter-spacing:5px; margin-top:6px; animation:pulse-sub 2s ease infinite; }
@keyframes pulse-sub{0%,100%{opacity:1}50%{opacity:.55}}

.sel-row { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.sel-slot { background:var(–card); border:3px solid #2a2a4a; border-radius:10px; padding:10px 8px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; min-height:82px; box-shadow:3px 3px 0 #000; position:relative; transition:border-color .2s; }
.sel-slot.is-active { border-color:var(–yellow); animation:slot-flash .85s ease-in-out infinite; }
.sel-slot.is-filled { border-color:#3a5a3a; }
@keyframes slot-flash { 0%,100%{border-color:var(–yellow);box-shadow:3px 3px 0 #000} 50%{border-color:var(–yellow);box-shadow:3px 3px 0 #000,0 0 14px 3px rgba(245,198,35,.6)} }
.slot-arrow { position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-size:10px; color:var(–yellow); display:none; animation:arrow-bounce .7s ease infinite; }
.sel-slot.is-active .slot-arrow { display:block; }
@keyframes arrow-bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-4px)} }
.sel-slot .slot-label { font-size:clamp(5px,1.8vw,7px); color:var(–gray); letter-spacing:1px; }
.sel-slot .slot-name  { font-size:clamp(6px,1.9vw,8px); color:var(–yellow); min-height:10px; }
.slot-empty-ring { width:36px; height:36px; border:2px dashed #2f2f5a; border-radius:50%; }
.sel-slot canvas { image-rendering:pixelated; }

.sel-banner { width:100%; background:var(–panel); border:2px solid var(–yellow); border-radius:8px; padding:9px 12px; font-size:clamp(6px,2vw,9px); color:var(–yellow); text-align:center; line-height:1.9; box-shadow:3px 3px 0 #000; }

.grid-panel { width:100%; background:var(–panel); border:2px solid #222; border-radius:10px; padding:10px 8px 12px; box-shadow:4px 4px 0 #000; }
.grid-title { font-size:clamp(7px,2.3vw,9px); color:var(–yellow); margin-bottom:10px; }
.poke-grid  { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
@media(max-width:340px){.poke-grid{grid-template-columns:repeat(4,1fr);}}

.poke-card { background:var(–card); border:2px solid #2a2a4a; border-radius:7px; padding:5px 3px; cursor:pointer; text-align:center; display:flex; flex-direction:column; align-items:center; gap:3px; min-height:70px; -webkit-user-select:none; user-select:none; transition:transform .1s,border-color .12s,background .12s; }
.poke-card:active { transform:scale(.93); }
.poke-card.sel-p    { border-color:#4a8a4a; background:#1a2a1a; }
.poke-card.sel-e    { border-color:#8a3a4a; background:#2a1a1a; }
.poke-card.sel-both { border-color:#6a6a1a; background:#1e1e0e; }
.poke-card canvas { image-rendering:pixelated; display:block; margin:0 auto; }
.poke-card .pcname { font-size:5px; color:var(–white); line-height:1.3; word-break:break-all; }
.pcbadge { font-size:5px; color:#000; padding:1px 3px; border-radius:2px; font-weight:bold; }

#start-bar { position:fixed; bottom:0; left:0; right:0; z-index:200; padding:8px 16px calc(var(–safe-b) + 8px); background:linear-gradient(transparent,var(–bg) 35%); display:flex; gap:10px; justify-content:center; align-items:center; }
#reset-btn { font-family:var(–font); font-size:clamp(7px,2.2vw,9px); padding:11px 14px; background:var(–card); color:var(–gray); border:2px solid #333; border-radius:6px; cursor:pointer; box-shadow:3px 3px 0 #000; min-height:44px; }
#reset-btn:active{transform:translate(1px,1px);box-shadow:2px 2px 0 #000;}
#start-btn { font-family:var(–font); font-size:clamp(8px,2.5vw,12px); padding:13px 28px; background:var(–accent); color:#fff; border:2px solid #000; border-radius:6px; cursor:pointer; box-shadow:4px 4px 0 #000; min-height:44px; min-width:160px; letter-spacing:1px; opacity:.3; transition:opacity .2s; }
#start-btn:not(:disabled){opacity:1;animation:pulse-start 1.5s ease infinite;}
#start-btn:disabled{pointer-events:none;}
#start-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #000;animation:none;}
@keyframes pulse-start{0%,100%{box-shadow:4px 4px 0 #000}50%{box-shadow:4px 4px 0 #000,0 0 16px 4px rgba(233,69,96,.55)}}

/* BATTLE */
#battle-screen { height:100dvh; max-height:100dvh; overflow:hidden; }
#battle-field { flex:0 0 auto; position:relative; background:linear-gradient(180deg,#4a88c8 0%,#72b2e8 48%,#72b2e8 52%,#8acc58 52%,#62a23a 66%,#4c7830 100%); height:clamp(168px,41vw,230px); border-bottom:3px solid #000; overflow:hidden; }
.plat{position:absolute;height:9px;border-radius:50%;background:rgba(0,0,0,.18);bottom:24%;}
#plat-e{width:78px;right:13%;} #plat-p{width:98px;left:7%;bottom:9%;}
.binfo { position:absolute; background:#f6f4ea; border:2px solid #000; border-radius:6px; padding:5px 8px 6px; min-width:clamp(118px,37vw,166px); box-shadow:3px 3px 0 #000; color:#111; }
#einfo{top:8px;left:8px;} #pinfo{bottom:8px;right:8px;}
.bpname{font-size:clamp(5px,1.8vw,8px);display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.blvl{font-size:clamp(4px,1.4vw,6px);color:#555;}
.hplabel{font-size:clamp(4px,1.4vw,6px);color:#555;margin-bottom:2px;}
.hpout{width:100%;height:6px;background:#ccc;border:2px solid #555;overflow:hidden;}
.hpin{height:100%;background:var(–hp-g);transition:width .4s ease,background-color .4s;}
.hpnum{font-size:clamp(4px,1.4vw,6px);color:#555;text-align:right;margin-top:1px;}
.expout{width:100%;height:3px;background:#ddd;border:1px solid #999;margin-top:3px;}
.expin{height:100%;background:#5090d0;transition:width .5s;}
.sbadge{font-size:5px;padding:1px 3px;border-radius:2px;margin-left:3px;color:#fff;font-weight:bold;}
.s-PSN{background:#a040a0}.s-BRN{background:#f08030}.s-PAR{background:#e8c800;color:#000}
.s-SLP{background:#708080}.s-FRZ{background:#80c8d0;color:#000}
#esp,#psp{position:absolute;image-rendering:pixelated;image-rendering:crisp-edges;}
#esp{right:12%;top:8%;} #psp{left:4%;bottom:20%;transform:scaleX(-1);}
#pfx{position:absolute;inset:0;pointer-events:none;z-index:10;}
@keyframes shake-e{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes shake-p{0%,100%{transform:scaleX(-1)}25%{transform:scaleX(-1) translateX(5px)}75%{transform:scaleX(-1) translateX(-5px)}}
@keyframes faint-e{to{opacity:0;transform:translateY(50px)}}
@keyframes faint-p{to{opacity:0;transform:scaleX(-1) translateY(50px)}}
.shk-e{animation:shake-e .38s ease;} .shk-p{animation:shake-p .38s ease;}

#bui{flex:1 1 auto;background:var(–white);display:flex;flex-direction:column;overflow:hidden;min-height:0;border-top:3px solid #000;padding-bottom:var(–safe-b);}
#msgbox{flex:0 0 auto;background:var(–white);border-bottom:2px solid #000;padding:clamp(8px,2.5vw,12px) clamp(10px,3vw,16px);min-height:clamp(50px,14vw,68px);display:flex;align-items:center;}
#msgtext{font-size:clamp(7px,2.2vw,10px);color:#111;line-height:1.85;font-family:var(–font);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#msgcursor{display:inline-block;width:7px;height:7px;border-right:2px solid #111;border-bottom:2px solid #111;transform:rotate(45deg);margin-left:5px;vertical-align:middle;animation:blink .9s infinite;}

#battle-btns{flex:1 1 auto;display:grid;grid-template-columns:1fr 1fr;min-height:0;}
.gbtn{font-family:var(–font);font-size:clamp(8px,2.5vw,11px);padding:clamp(10px,3vw,15px) clamp(8px,2.5vw,12px);border:none;border-right:2px solid #000;border-bottom:2px solid #000;cursor:pointer;background:var(–white);color:#111;text-align:left;display:flex;align-items:center;gap:6px;min-height:52px;touch-action:manipulation;-webkit-user-select:none;user-select:none;transition:background .08s;}
.gbtn:nth-child(2n){border-right:none;} .gbtn:nth-child(n+3){border-bottom:none;}
.gbtn:active{background:#e0e0e8;} .gbtn .arr{color:var(–accent);}

#move-btns{flex:1 1 auto;display:none;grid-template-columns:1fr 1fr;min-height:0;}
.mbtn{font-family:var(–font);font-size:clamp(6px,2vw,9px);padding:clamp(8px,3vw,12px) clamp(8px,2.5vw,12px);border:none;border-right:2px solid #000;border-bottom:2px solid #000;cursor:pointer;background:var(–white);color:#111;text-align:left;display:flex;flex-direction:column;gap:3px;min-height:52px;touch-action:manipulation;-webkit-user-select:none;user-select:none;transition:background .08s;}
.mbtn:nth-child(2n){border-right:none;} .mbtn:nth-child(n+3){border-bottom:none;}
.mbtn:active{background:#dde8ff;} .mbtn.no-pp{color:#bbb;}
.mtype{font-size:5px;color:#fff;padding:1px 4px;border-radius:2px;display:inline-block;}
.mpp{font-size:5px;color:#666;align-self:flex-end;}
#backbtn{font-family:var(–font);font-size:clamp(7px,2.2vw,9px);padding:11px;min-height:42px;border:none;border-top:2px solid #000;background:#eee;color:#555;cursor:pointer;text-align:center;width:100%;flex-shrink:0;touch-action:manipulation;-webkit-user-select:none;user-select:none;display:none;}
#backbtn:active{background:#ddd;}

/* RESULT */
#result-screen{min-height:100dvh;padding:calc(var(–safe-t)+20px) 20px calc(var(–safe-b)+20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;}
#rtitle{font-size:clamp(18px,6vw,32px);text-shadow:4px 4px 0 #000;}
.win{color:var(–yellow)}.lose{color:var(–accent)}.draw{color:var(–gray)}
#rmsg{font-size:clamp(7px,2.5vw,9px);color:var(–white);line-height:2.2;max-width:320px;white-space:pre-line;}
.rb-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.rdbtn{font-family:var(–font);font-size:clamp(8px,2.5vw,11px);padding:13px 20px;border:2px solid #000;border-radius:5px;cursor:pointer;box-shadow:4px 4px 0 #000;min-height:48px;min-width:120px;touch-action:manipulation;transition:transform .1s,box-shadow .1s;}
.rdbtn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #000;}
.rdbtn.primary{background:var(–accent);color:#fff;} .rdbtn.secondary{background:#0f3460;color:#fff;}

.t-fire{background:#f08030}.t-water{background:#6890f0}.t-grass{background:#78c850}
.t-electric{background:#f8d030;color:#000!important}.t-psychic{background:#f85888}
.t-ice{background:#98d8d8;color:#000!important}.t-normal{background:#a8a878}
.t-fighting{background:#c03028}.t-poison{background:#a040a0}
.t-ground{background:#e0c068;color:#000!important}.t-flying{background:#a890f0}
.t-bug{background:#a8b820}.t-rock{background:#b8a038}.t-ghost{background:#705898}
.t-dragon{background:#7038f8}.t-dark{background:#705848}
.t-steel{background:#b8b8d0;color:#000!important}.t-fairy{background:#e898e8}

/* ── FIGHT! Splash overlay ── */
.fight-splash {
position:fixed; inset:0; z-index:5000;
background:rgba(0,0,0,.85);
display:flex; align-items:center; justify-content:center;
pointer-events:none;
}
.fight-text {
font-family:var(–font);
font-size:clamp(36px,12vw,72px);
color:var(–yellow);
text-shadow:4px 4px 0 #000, 0 0 30px rgba(245,198,35,.9), 0 0 60px rgba(245,198,35,.5);
animation:fight-pop .5s cubic-bezier(.17,.67,.35,1.4) both;
letter-spacing:4px;
}
@keyframes fight-pop {
0%   {transform:scale(0) rotate(-8deg);opacity:0}
60%  {transform:scale(1.2) rotate(2deg);opacity:1}
100% {transform:scale(1) rotate(0);opacity:1}
}

/* ── Battle progress bar ── */
#battle-header {
background:#1a1a2e;
border-bottom:2px solid #000;
padding:5px 12px;
display:flex; align-items:center; justify-content:space-between;
flex-shrink:0;
}
#battle-progress {
font-size:clamp(6px,1.8vw,8px);
color:var(–yellow);
}

/* ── Party dots row ── */
#party-row {
display:flex; gap:5px; align-items:center;
}
.party-dot {
width:24px; height:24px;
border:2px solid #444;
border-radius:4px;
overflow:hidden;
background:var(–card);
display:flex; align-items:center; justify-content:center;
}
.party-dot canvas { image-rendering:pixelated; }
.party-dot.active  { border-color:var(–yellow); }
.party-dot.fainted { opacity:.35; filter:grayscale(1); }

/* ── Pokeball count in bag/ui ── */
.ball-count { font-size:6px; color:#aaa; }
</style>

</head>
<body>
<canvas id="starfield"></canvas>

<div id="title-screen" class="screen active">
  <div class="logo">
    <div class="logo-name">TokeBeast</div>
    <div class="logo-sub">&#9733; BATTLE EDITION &#9733;</div>
  </div>
  <div class="sel-row">
    <div class="sel-slot is-active" id="slot-p">
      <span class="slot-arrow">&#9660;</span>
      <div class="slot-label">YOUR BEAST</div>
      <div class="slot-empty-ring" id="slot-p-ring"></div>
      <canvas id="slot-p-canvas" width="40" height="40" style="display:none"></canvas>
      <div class="slot-name" id="slot-p-name"></div>
    </div>
    <div class="sel-slot" id="slot-e">
      <span class="slot-arrow">&#9660;</span>
      <div class="slot-label">OPPONENT</div>
      <div class="slot-empty-ring" id="slot-e-ring"></div>
      <canvas id="slot-e-canvas" width="40" height="40" style="display:none"></canvas>
      <div class="slot-name" id="slot-e-name"></div>
    </div>
  </div>
  <div class="sel-banner" id="sel-banner">&#9658; Tap a beast to pick YOUR fighter</div>
  <div class="grid-panel">
    <div class="grid-title">&#9658; CHOOSE YOUR BEAST</div>
    <div class="poke-grid" id="poke-grid"></div>
  </div>
  <div style="font-size:6px;color:var(--gray);text-align:center;line-height:2.3;padding:0 8px">
    FIGHT &middot; BAG &middot; SWITCH &middot; RUN<br>
    Type matchups matter &mdash; choose wisely!
  </div>
</div>

<div id="start-bar">
  <button id="reset-btn">&#8634; RESET</button>
  <button id="start-btn" disabled>&#9658; BATTLE!</button>
</div>

<div id="battle-screen" class="screen">
  <!-- Campaign progress + party icons -->
  <div id="battle-header">
    <div id="battle-progress">Battle 1 of 14</div>
    <div id="party-row"></div>
  </div>
  <div id="battle-field">
    <canvas id="pfx"></canvas>
    <div class="plat" id="plat-e"></div>
    <div class="plat" id="plat-p"></div>
    <div class="binfo" id="einfo">
      <div class="bpname"><span id="ename">---</span><span class="blvl" id="elvl">Lv1</span></div>
      <div class="hplabel">HP <span id="estatus"></span></div>
      <div class="hpout"><div class="hpin" id="ehpbar" style="width:100%"></div></div>
      <div class="hpnum" id="ehpnum"></div>
    </div>
    <div class="binfo" id="pinfo">
      <div class="bpname"><span id="pname">---</span><span class="blvl" id="plvl">Lv1</span></div>
      <div class="hplabel">HP <span id="pstatus"></span></div>
      <div class="hpout"><div class="hpin" id="phpbar" style="width:100%"></div></div>
      <div class="hpnum" id="phpnum"></div>
      <div class="expout"><div class="expin" id="expbar" style="width:30%"></div></div>
    </div>
    <canvas id="esp" width="80" height="80"></canvas>
    <canvas id="psp" width="80" height="80"></canvas>
  </div>
  <div id="bui">
    <div id="msgbox"><div id="msgtext">Ready! <span id="msgcursor"></span></div></div>
    <div id="battle-btns">
      <button class="gbtn" id="btn-fight"><span class="arr">&#9658;</span>FIGHT</button>
      <button class="gbtn" id="btn-bag"><span class="arr">&#9658;</span>BAG</button>
      <button class="gbtn" id="btn-switch"><span class="arr">&#9658;</span>SWITCH</button>
      <button class="gbtn" id="btn-run"><span class="arr">&#9658;</span>RUN</button>
    </div>
    <div id="move-btns"></div>
    <button id="backbtn">&#9664; BACK</button>
  </div>
</div>

<div id="result-screen" class="screen">
  <div id="rtitle">---</div>
  <canvas id="rsprite" width="112" height="112" style="image-rendering:pixelated"></canvas>
  <div id="rmsg"></div>
  <div class="rb-row" id="rb-row"></div>
</div>

<script>
'use strict';
const $  = id => document.getElementById(id);
const mkEl = (tag,cls) => { const e=document.createElement(tag); if(cls)e.className=cls; return e; };


// ── TYPE CHART ─────────────────────────────────────────────
const TC = {
  fire:     {grass:2,ice:2,bug:2,steel:2,water:0.5,fire:0.5,rock:0.5,dragon:0.5},
  water:    {fire:2,ground:2,rock:2,water:0.5,grass:0.5,dragon:0.5},
  grass:    {water:2,ground:2,rock:2,fire:0.5,grass:0.5,poison:0.5,flying:0.5,bug:0.5,dragon:0.5,steel:0.5},
  electric: {water:2,flying:2,grass:0.5,electric:0.5,dragon:0.5,ground:0},
  ice:      {grass:2,ground:2,flying:2,dragon:2,fire:0.5,water:0.5,ice:0.5,steel:0.5},
  fighting: {normal:2,ice:2,rock:2,dark:2,steel:2,poison:0.5,flying:0.5,psychic:0.5,bug:0.5,ghost:0},
  poison:   {grass:2,fairy:2,poison:0.5,ground:0.5,rock:0.5,ghost:0.5,steel:0},
  ground:   {fire:2,electric:2,poison:2,rock:2,steel:2,grass:0.5,bug:0.5,flying:0},
  flying:   {grass:2,fighting:2,bug:2,electric:0.5,rock:0.5,steel:0.5},
  psychic:  {fighting:2,poison:2,psychic:0.5,steel:0.5,dark:0,ghost:0},
  bug:      {grass:2,psychic:2,dark:2,fire:0.5,fighting:0.5,flying:0.5,ghost:0.5,steel:0.5},
  rock:     {fire:2,ice:2,flying:2,bug:2,fighting:0.5,ground:0.5,steel:0.5},

// ── PARTICLE SYSTEM ──────────────────────────────────────
class Particles {
  constructor(c) {
    this.c = c; this.x = c.getContext('2d');
    this.p = []; this.active = false;
    this.resize();
  }
  resize() {
    const p = this.c.parentElement;
    this.c.width = p.offsetWidth||320;
    this.c.height = p.offsetHeight||200;
  }
  emit(type, x, y) {
    const cfg = {
      fire:    {n:16,cols:['#f83000','#f8a000','#fff0a0','#fff'],sz:[4,12],lf:[0.6,1.0],vx:[-2,2],vy:[-4,-1]},
      water:   {n:14,cols:['#4088f8','#88ccff','#fff'],          sz:[4,10],lf:[0.5,0.9],vx:[-3,3],vy:[-3,1]},
      grass:   {n:14,cols:['#40c840','#90f060','#e8ffe8'],        sz:[4,10],lf:[0.5,0.8],vx:[-2,2],vy:[-4,-1]},
      electric:{n:20,cols:['#f8e000','#f8f870','#fff'],           sz:[2,7], lf:[0.3,0.6],vx:[-5,5],vy:[-5,5]},
      ice:     {n:15,cols:['#90e0f0','#c0f8f8','#fff'],           sz:[3,9], lf:[0.6,1.0],vx:[-3,3],vy:[-3,2]},
      psychic: {n:14,cols:['#f060a0','#f8b8d0','#fff'],           sz:[5,13],lf:[0.6,1.0],vx:[-2,2],vy:[-4,-1]},
      normal:  {n:12,cols:['#c0c0c0','#e8e8e8','#fff'],           sz:[3,8], lf:[0.4,0.7],vx:[-3,3],vy:[-3,1]},
      poison:  {n:14,cols:['#c030c0','#e870e8','#fff'],           sz:[4,10],lf:[0.5,0.9],vx:[-2,2],vy:[-3,1]},
      ground:  {n:16,cols:['#d8b860','#b88030','#806020'],        sz:[4,10],lf:[0.5,0.9],vx:[-3,3],vy:[-2,2]},
      rock:    {n:12,cols:['#b09030','#d0b048','#f0d870'],        sz:[5,12],lf:[0.4,0.8],vx:[-4,4],vy:[-4,1]},
      ghost:   {n:14,cols:['#705090','#9870c8','#c8a8f8'],        sz:[6,16],lf:[0.8,1.4],vx:[-1,1],vy:[-3,0]},
      dragon:  {n:16,cols:['#7030f8','#a058f8','#c8a0f8'],        sz:[5,14],lf:[0.7,1.2],vx:[-2,2],vy:[-4,-1]},
      dark:    {n:14,cols:['#705040','#a07860','#c0a888'],         sz:[4,10],lf:[0.5,0.9],vx:[-3,3],vy:[-3,1]},
      fighting:{n:14,cols:['#c02820','#e04838','#f08070'],        sz:[4,10],lf:[0.4,0.8],vx:[-4,4],vy:[-4,0]},
      flying:  {n:14,cols:['#a888f0','#c8a8f8','#e8d8ff'],        sz:[3,9], lf:[0.5,0.9],vx:[-3,3],vy:[-4,-1]},
    };
    const C = cfg[type]||cfg.normal;
    const R=(a,b)=>a+Math.random()*(b-a);
    for(let i=0;i<C.n;i++) this.p.push({
      x,y,vx:R(...C.vx),vy:R(...C.vy),
      sz:R(...C.sz),col:C.cols[Math.floor(Math.random()*C.cols.length)],
      lf:R(...C.lf),ml:R(...C.lf),g:0.14
    });
    if(!this.active) this._loop();
  }
  _loop() {
    this.active=true;
    const tick=()=>{
      this.x.clearRect(0,0,this.c.width,this.c.height);
      this.p=this.p.filter(p=>p.lf>0);
      for(const p of this.p){
        p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.lf-=0.022;
        const a=Math.max(0,p.lf/p.ml);
        this.x.globalAlpha=a;
        this.x.fillStyle=p.col;
        this.x.beginPath();
        this.x.arc(p.x,p.y,Math.max(1,p.sz*a),0,Math.PI*2);
        this.x.fill();
      }
      this.x.globalAlpha=1;
      if(this.p.length>0) requestAnimationFrame(tick);
      else this.active=false;
    };
    requestAnimationFrame(tick);
  }
}

function drawSprite(canvas, name, size) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,size,size);
  const S = size/16;
  const fn = SPRS[name.toLowerCase()];
  if(fn) fn(ctx,S);
  else {
    ctx.fillStyle='#888';
    ctx.beginPath();ctx.arc(size/2,size/2,size/3,0,Math.PI*2);ctx.fill();
  }
}


function drawSprite(canvas, name, size) {
  canvas.width=size; canvas.height=size;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,size,size);
  const S=size/16;
  const fn=SPRS[name.toLowerCase()];
  if(fn) fn(ctx,S);
  else { ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(size/2,size/2,size/3,0,Math.PI*2); ctx.fill(); }
}

// ── WEB AUDIO SOUND ENGINE ──────────────────────────────────
// All sounds are procedurally synthesised — no files required.
// AudioContext is lazy-created on first interaction (iOS policy).
let AC = null;
function getAC() {
  if(!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if(AC.state === 'suspended') AC.resume();
  return AC;
}

function playTone(freq, type, dur, vol=0.3, decay=true) {
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
    g.gain.setValueAtTime(vol, ac.currentTime);
    if(decay) g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(ac.currentTime);
    o.stop(ac.currentTime + dur);
  } catch(e) {}
}

function playFreqSeq(notes, dur=0.08, vol=0.25, type='square') {
  // notes = [{f,t}] — f=freq, t=time offset
  notes.forEach(({f,t}) => {
    try {
      const ac = getAC();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = type; o.frequency.setValueAtTime(f, ac.currentTime + t);
      g.gain.setValueAtTime(vol, ac.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + dur);
      o.start(ac.currentTime + t);
      o.stop(ac.currentTime + t + dur + 0.02);
    } catch(e) {}
  });
}

function playNoise(dur=0.1, vol=0.15) {
  try {
    const ac = getAC();
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src = ac.createBufferSource();
    const g = ac.createGain();
    src.buffer = buf; src.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    src.start();
  } catch(e) {}
}

// ── CAMPAIGN STATE ──────────────────────────────────────────
// Session-level game state (no persistence — resets on page reload)
let CAMP = {
  active: false,
  playerIdx: null,       // PKM index of chosen beast
  queue: [],             // remaining opponent PKM indices (shuffled)
  battleNum: 0,          // current battle number (1-based)
  total: 0,              // total battles to fight
  party: [],             // caught TokeBeast (battle-ready copies), max 6
  bag: {potion:3, superpotion:1, fullheal:2, pokeball:5},
  activePartyIdx: 0,     // which party member is currently fighting
};

function startCampaign(playerIdx) {
  const others = PKM.map((_,i)=>i).filter(i=>i!==playerIdx);
  // Shuffle
  for(let i=others.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [others[i],others[j]]=[others[j],others[i]];
  }
  CAMP = {
    active: true,
    playerIdx,
    queue: others,
    battleNum: 0,
    total: others.length,
    party: [ mkPoke(PKM[playerIdx]) ], // start with your chosen beast
    bag: {potion:3, superpotion:1, fullheal:2, pokeball:5},
    activePartyIdx: 0,
  };
}

function getActivePoke() { return CAMP.party[CAMP.activePartyIdx]; }

// ── GAME BATTLE STATE ───────────────────────────────────────
let G = {};

function mkPoke(def, lv=15) {
  const b=def.bs, mhp=Math.floor((2*b.hp*lv)/100+lv+10);
  return {
    ...def, level:lv, maxHP:mhp, hp:mhp,
    atk:Math.floor((2*b.atk*lv)/100+5), def:Math.floor((2*b.def*lv)/100+5),
    spa:Math.floor((2*b.spa*lv)/100+5), spd:Math.floor((2*b.spd*lv)/100+5),
    moves:def.moves.map(m=>MV[m]?{...MV[m],id:m,cpp:MV[m].pp}:null).filter(Boolean),
    status:null, statusTurns:0, stages:{atk:0,def:0,spa:0,spd:0,acc:0}, fainted:false,
  };
}
function stgMult(s){const t=[.25,.28,.33,.4,.5,.66,1,1.5,2,2.5,3,3.5,4];return t[Math.min(12,Math.max(0,s+6))];}
function calcDmg(att,def,mv){
  if(mv.pw===0)return 0; if(mv.fx&&mv.fx.fixd)return mv.fx.fixamt||att.level;
  const isSp=mv.cat==='special';
  const a=(isSp?att.spa:att.atk)*stgMult(att.stages[isSp?'spa':'atk']||0);
  const d=(isSp?def.spa:def.def)*stgMult(def.stages[isSp?'spa':'def']||0);
  let dm=Math.floor((2*att.level/5+2)*mv.pw*a/d/50)+2;
  if(att.types.includes(mv.type))dm=Math.floor(dm*1.5);
  dm=Math.floor(dm*typeEff(mv.type,def.types));
  if(Math.random()<(mv.critHigh?.25:.0625))dm=Math.floor(dm*1.5);
  return Math.max(1,Math.floor(dm*(.85+Math.random()*.15)));
}

// ── FIGHT! Intro Splash ───────────────────────────────────────
function showFightSplash() {
  return new Promise(res => {
    const overlay = mkEl('div','fight-splash');
    overlay.innerHTML = '<div class="fight-text">FIGHT!</div>';
    document.body.appendChild(overlay);
    // Shockwave rings via canvas
    const cvs = mkEl('canvas');
    cvs.style.cssText = 'position:absolute;inset:0;pointer-events:none;';
    overlay.appendChild(cvs);
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;
    const ctx = cvs.getContext('2d');
    const cx = cvs.width/2, cy = cvs.height/2;
    let rings = [{r:0,a:1},{r:0,a:.8,delay:6},{r:0,a:.6,delay:12}];
    let frame = 0;
    SFX.battleStart();
    function drawRings() {
      ctx.clearRect(0,0,cvs.width,cvs.height);
      rings.forEach(ring => {
        if(frame < (ring.delay||0)) return;
        ring.r += 12;
        ring.a *= 0.96;
        ctx.beginPath();
        ctx.arc(cx,cy,ring.r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(255,255,80,${ring.a})`;
        ctx.lineWidth=4;
        ctx.stroke();
      });
      frame++;
      if(frame < 55) requestAnimationFrame(drawRings);
    }
    drawRings();
    // Fade out overlay
    setTimeout(()=>{
      overlay.style.transition='opacity .4s';
      overlay.style.opacity='0';
      setTimeout(()=>{ overlay.remove(); res(); }, 420);
    }, 900);
  });
}

// ── Campaign battle starter ───────────────────────────────────
async function startCampaignBattle(playerIdx, firstEnemyIdx) {
  startCampaign(playerIdx);
  // Reorder queue so firstEnemyIdx is first
  const pos = CAMP.queue.indexOf(firstEnemyIdx);
  if(pos>0){ CAMP.queue.splice(pos,1); CAMP.queue.unshift(firstEnemyIdx); }
  await launchNextBattle();
}

async function launchNextBattle() {
  if(CAMP.queue.length===0){
    showCampaignComplete(); return;
  }
  const enemyIdx = CAMP.queue.shift();
  CAMP.battleNum++;
  CAMP.activePartyIdx = 0; // use first non-fainted party member

  // Heal player party between battles (partial heal — 40% of max)
  CAMP.party.forEach(p=>{
    if(!p.fainted) p.hp=Math.min(p.maxHP,p.hp+Math.floor(p.maxHP*.4));
    p.status=null; p.stages={atk:0,def:0,spa:0,spd:0,acc:0};
  });

  G = {
    enemy: mkPoke(PKM[enemyIdx]),
    on:true, busy:false, turn:0, particles:null,
    enemyDef: PKM[enemyIdx], // keep definition for catch
    caughtThisBattle: false,
  };

  showScreen('battle-screen');

  requestAnimationFrame(async ()=>{
    G.particles = new Particles($('pfx'));
    const ss = Math.floor(Math.min(80,window.innerWidth*.2));

    drawSprite($('psp'),player.spr,ss);
    drawSprite($('esp'),G.enemy.spr,ss);
    $('pname').textContent=player.name;
    $('ename').textContent=G.enemy.name;
    $('plvl').textContent='Lv'+player.level;
    $('elvl').textContent='Lv'+G.enemy.level;
    updHP('player'); updHP('enemy');
    updStatus('player'); updStatus('enemy');
    updBattleHeader();
    updPartyIcons();

    mq=[]; mb=false;

    // Fight! intro
    await showFightSplash();

    G.busy=true;
    await showMsg(`Battle ${CAMP.battleNum} of ${CAMP.total}!`,1000);
    await showMsg(`A wild ${G.enemy.name} appeared!`,1200);
    await showMsg(`Go! ${player.name}!`,1100);
    showAction();
    G.busy=false;
  });
}

// ── Player move ────────────────────────────────────────────────
async function doPlayerMove(mi){
  if(!G.on||G.busy)return;
  G.busy=true; showAction();
  const player=CAMP.party[CAMP.activePartyIdx];
  const mv=player.moves[mi];
  if(!mv||mv.cpp<=0){await showMsg('No PP left!',900);showAction();G.busy=false;return;}
  mv.cpp--;
  if(player.status==='PAR'&&Math.random()<.25){await showMsg(`${player.name} is paralyzed!`,1100);await doEnemyTurn();return;}
  if(player.status==='SLP'){player.statusTurns--;if(player.statusTurns>0){await showMsg(`${player.name} is fast asleep!`,1100);await doEnemyTurn();return;}player.status=null;updStatus('player');await showMsg(`${player.name} woke up!`,1100);}
  if(player.status==='FRZ'){if(Math.random()<.8){await showMsg(`${player.name} is frozen solid!`,1100);await doEnemyTurn();return;}player.status=null;updStatus('player');await showMsg(`${player.name} thawed out!`,1100);}
  await execMove(player,G.enemy,mv,'player');
  if(!G.on)return;
  if(G.enemy.hp<=0){
    G.enemy.hp=0;updHP('enemy');
    $('esp').style.animation='faint-e .5s forwards';
    SFX.victory();
    await showMsg(`Enemy ${G.enemy.name} fainted!`,1400);
    G.on=false; G.busy=false;
    setTimeout(()=>showWinScreen(),700); return;
  }
  await doEnemyTurn();
}

// ── Enemy turn ─────────────────────────────────────────────────
async function doEnemyTurn(){
  if(!G.on)return;
  const player=CAMP.party[CAMP.activePartyIdx];
  if(G.enemy.status==='PAR'&&Math.random()<.25){await showMsg(`${G.enemy.name} is paralyzed!`,1000);}
  else if(G.enemy.status==='SLP'){G.enemy.statusTurns--;if(G.enemy.statusTurns>0)await showMsg(`${G.enemy.name} is asleep...`,900);else{G.enemy.status=null;updStatus('enemy');await showMsg(`${G.enemy.name} woke up!`,1100);}}
  else if(G.enemy.status==='FRZ'&&Math.random()<.8){await showMsg(`${G.enemy.name} is frozen!`,900);}
  else{const mv=aiPick(G.enemy,player);if(mv)await execMove(G.enemy,player,mv,'enemy');}
  if(!G.on)return;
  if(player.hp<=0){
    player.hp=0; player.fainted=true;
    updHP('player');
    $('psp').style.animation='faint-p .5s forwards';
    SFX.defeat();
    await showMsg(`${player.name} fainted!`,1400);
    updPartyIcons();
    // Check if any party member alive
    const nextAlive=CAMP.party.findIndex((p,i)=>i!==CAMP.activePartyIdx&&!p.fainted);
    if(nextAlive===-1){
      G.on=false; G.busy=false;
      setTimeout(()=>showLoseScreen(),700); return;
    }
    await showMsg(`Choose your next beast!`,1000);
    await doSwitch(nextAlive);
    G.busy=false; return;
  }
  for(const who of['player','enemy']){
    const pk = who==='player'?CAMP.party[CAMP.activePartyIdx]:G.enemy;
    if((pk.status==='BRN'||pk.status==='PSN')&&G.on){
      const dmg=Math.max(1,Math.floor(pk.maxHP/8));pk.hp=Math.max(0,pk.hp-dmg);updHP(who);
      const wn=who==='player'?pk.name:'Enemy '+pk.name;
      await showMsg(`${wn} hurt by ${pk.status==='BRN'?'burn':'poison'}!`,900);
      if(pk.hp<=0&&G.on){
        $(who==='player'?'psp':'esp').style.animation=who==='player'?'faint-p .5s forwards':'faint-e .5s forwards';
        await showMsg(`${wn} fainted!`,1400);
        if(who==='player'){
          pk.fainted=true; updPartyIcons();
          const nx=CAMP.party.findIndex((p,i)=>i!==CAMP.activePartyIdx&&!p.fainted);
          if(nx===-1){G.on=false;G.busy=false;setTimeout(()=>showLoseScreen(),700);return;}
          await doSwitch(nx); G.busy=false; return;
        } else {
          G.on=false;G.busy=false;setTimeout(()=>showWinScreen(),700);return;
        }
      }
    }
  }
  G.turn++;
  if(G.on){
    const pl=CAMP.party[CAMP.activePartyIdx];
    $('msgtext').innerHTML=`What will ${pl.name} do? <span id="msgcursor"></span>`;
    showAction();G.busy=false;
  }
}

// ── Execute move ───────────────────────────────────────────────
async function execMove(att,def,mv,who){
  const isP=who==='player',ap=isP?'':'Enemy ',dp=isP?'Enemy ':'';
  await showMsg(`${ap}${att.name} used ${mv.name}!`,850);
  SFX.attackSound(mv.type);
  const accM=stgMult(att.stages.acc||0)/stgMult(def.stages.acc||0);
  if(Math.random()*100>mv.ac*accM){SFX.miss();await showMsg(`${ap}${att.name}'s attack missed!`,950);return;}
  const fld=$('battle-field');
  if(G.particles)G.particles.emit(mv.type,isP?fld.offsetWidth*.72:fld.offsetWidth*.28,isP?fld.offsetHeight*.3:fld.offsetHeight*.65);
  if(mv.cat==='status'){
    const e=mv.fx;if(!e){await showMsg('...',400);return;}
    if(e.heal){att.hp=Math.min(att.maxHP,att.hp+Math.floor(att.maxHP*e.heal));updHP(who);SFX.item();await showMsg(`${ap}${att.name} recovered HP!`,950);}
    else if(e.st){const tgt=e.self?att:def,tW=e.self?who:(isP?'enemy':'player'),tn=e.self?`${ap}${att.name}`:`${dp}${def.name}`;
      if(!tgt.status){tgt.status=e.st;if(e.st==='SLP')tgt.statusTurns=2+Math.floor(Math.random()*3);updStatus(tW);SFX.status();
        const sn={PSN:'was poisoned',BRN:'was burned',PAR:'was paralyzed',SLP:'fell asleep',FRZ:'was frozen'};
        await showMsg(`${tn} ${sn[e.st]||'was affected'}!`,950);}
      else await showMsg(`${tn} is already affected!`,750);}
    else if(e.stat){const tgt=e.self?att:def,tn=e.self?`${ap}${att.name}`:`${dp}${def.name}`;
      tgt.stages[e.stat]=Math.max(-6,Math.min(6,(tgt.stages[e.stat]||0)+(e.stages||0)));
      const sn2={atk:'Attack',def:'Defense',spa:'Sp.Atk',spd:'Speed',acc:'Accuracy'};
      await showMsg(`${tn}'s ${sn2[e.stat]} ${(e.stages||0)>0?'rose':'fell'}!`,850);}
    return;
  }
  const ef=typeEff(mv.type,def.types);
  if(ef===0){await showMsg('It had no effect!',850);return;}
  const dmg=calcDmg(att,def,mv);
  if(ef>=2){SFX.superHit();await showMsg('Super effective!',650);}
  else if(ef<=.5){SFX.weakHit();await showMsg('Not very effective...',650);}
  else SFX.hit();
  const dsp=$(isP?'esp':'psp');
  dsp.classList.remove('shk-e','shk-p');void dsp.offsetWidth;
  dsp.classList.add(isP?'shk-e':'shk-p');setTimeout(()=>dsp.classList.remove('shk-e','shk-p'),420);
  def.hp=Math.max(0,def.hp-dmg);updHP(isP?'enemy':'player');
  const e2=mv.fx;
  if(e2&&!e2.fixd&&!e2.heal&&e2.ch&&Math.random()*100<e2.ch){
    if(e2.st&&!def.status){def.status=e2.st;if(e2.st==='SLP')def.statusTurns=2+Math.floor(Math.random()*3);updStatus(isP?'enemy':'player');SFX.status();
      const sn={PSN:'was poisoned',BRN:'was burned',PAR:'was paralyzed',SLP:'fell asleep',FRZ:'was frozen'};
      await showMsg(`${dp}${def.name} ${sn[e2.st]}!`,850);}
    else if(e2.stat){def.stages[e2.stat]=Math.max(-6,Math.min(6,(def.stages[e2.stat]||0)+(e2.stages||0)));}
  }
}

// ── AI ─────────────────────────────────────────────────────────
function aiPick(en,pl){
  const avail=en.moves.filter(m=>m.cpp>0);
  if(!avail.length)return{name:'Struggle',type:'normal',pw:50,ac:100,pp:1,cpp:1,cat:'physical',fx:null};
  const sc=avail.map(mv=>{let s=0;if(mv.cat!=='status'){const d=calcDmg(en,pl,mv);s=d*2+typeEff(mv.type,pl.types)*10+(d>=pl.hp?100:0);}else s=en.hp>en.maxHP*.5&&!pl.status?20:3;return{mv,s};}).sort((a,b)=>b.s-a.s);
  return sc[Math.floor(Math.random()*Math.min(2,sc.length))].mv;
}

  $('rmsg').textContent = msg;

  drawSprite($('rsprite'), G.enemy.spr, 112);

  // Button row
  const row = $('rb-row');
  row.innerHTML='';

  if(canCatch) {
    const cb = mkEl('button','rdbtn primary');
    cb.innerHTML = `&#9912; CATCH! (${CAMP.bag.pokeball}x)`;
    cb.addEventListener('click', async ()=>{
      CAMP.bag.pokeball--;
      // Catch chance = based on enemy HP remaining (already 0 after faint) = always good after faint
      const caught = true; // always catchable after fainting
      if(caught){
        G.caughtThisBattle=true;
        const newPoke = mkPoke(G.enemyDef);
        newPoke.hp = Math.floor(newPoke.maxHP * 0.6); // starts at 60%
        CAMP.party.push(newPoke);
        SFX.catch();
        cb.textContent='Caught!'; cb.disabled=true;
        $('rmsg').textContent = `${G.enemy.name} joined your party!\nParty: ${CAMP.party.length}/6`;
        updPartyIcons();
      } else {
        SFX.catchFail();
        cb.textContent='Broke free!'; cb.disabled=true;
      }
    });
    row.appendChild(cb);
  }

  if(moreLeft){
    const nb = mkEl('button','rdbtn secondary');
    nb.innerHTML='&#9654; NEXT BATTLE';
    nb.addEventListener('click', ()=>{ launchNextBattle(); });
    row.appendChild(nb);
  } else {
    const eb = mkEl('button','rdbtn secondary');
    eb.innerHTML='&#8962; MAIN MENU';
    eb.addEventListener('click', ()=>{ showScreen('title-screen'); initTitle(); });
    row.appendChild(eb);
  }
}

function showLoseScreen(){
  showScreen('result-screen');
  $('rtitle').textContent='DEFEATED!'; $('rtitle').className='lose';
  const player=CAMP.party[CAMP.activePartyIdx];
  $('rmsg').textContent=`All your beasts fainted!\nEnemy ${G.enemy.name} was too strong.\nBetter luck next time!`;
  drawSprite($('rsprite'),player.spr,112);
  const row=$('rb-row'); row.innerHTML='';
  const mb=mkEl('button','rdbtn primary'); mb.innerHTML='&#8962; MAIN MENU';
  mb.addEventListener('click',()=>{showScreen('title-screen');initTitle();});
  row.appendChild(mb);
}

function showCampaignComplete(){
  showScreen('result-screen');
  $('rtitle').textContent='CHAMPION!'; $('rtitle').className='win';
  $('rmsg').textContent=`You defeated all 14 opponents!\nYou are the ultimate\nTokeBeast Master!`;
  const row=$('rb-row'); row.innerHTML='';
  const mb=mkEl('button','rdbtn primary'); mb.innerHTML='&#8962; PLAY AGAIN';
  mb.addEventListener('click',()=>{showScreen('title-screen');initTitle();});
  row.appendChild(mb);
}

// ── Screen manager ─────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const e=$(id);e.style.display=id==='battle-screen'?'flex':'block';e.classList.add('active');
  $('start-bar').style.display=id==='title-screen'?'flex':'none';
}

// ── Stars ───────────────────────────────────────────────────────
function initStars(){
  const c=$('starfield'),x=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const stars=Array.from({length:150},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+.2,s:Math.random()*.25+.05}));
  function tick(){x.clearRect(0,0,c.width,c.height);const t=Date.now()/2000;for(const s of stars){x.globalAlpha=.3+.7*Math.abs(Math.sin(t+s.x*.01));x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fill();s.y+=s.s;if(s.y>c.height){s.y=0;s.x=Math.random()*c.width;}}x.globalAlpha=1;requestAnimationFrame(tick);}
  tick();
}

// ── INIT ────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  initStars();
  $('title-screen').style.display='block';
  $('battle-screen').style.display='none';
  $('result-screen').style.display='none';
  $('start-bar').style.display='flex';
  initTitle();

  $('reset-btn').addEventListener('click',resetSel);
  $('start-btn').addEventListener('click',()=>{
    if(selP===null||selE===null)return;
    startCampaignBattle(selP,selE);
  });

  // Battle action buttons — attached once
  $('btn-fight').addEventListener('click',()=>{if(!G.on||G.busy)return;showMoves();});
  $('btn-bag').addEventListener('click',()=>{if(!G.on||G.busy)return;showBagMenu();});
  $('btn-switch').addEventListener('click',()=>{if(!G.on||G.busy)return;showSwitchMenu();});
  $('btn-run').addEventListener('click',async()=>{
    if(!G.on||G.busy)return;
    G.busy=true;
    await showMsg('You fled! Campaign over.',1200);
    G.on=false;G.busy=false;
    showLoseScreen();
  });
  $('backbtn').addEventListener('click',showAction);

  window.addEventListener('resize',()=>{
    const sf=$('starfield');sf.width=window.innerWidth;sf.height=window.innerHeight;
    if(G.particles)G.particles.resize();
  });
});


</script>
