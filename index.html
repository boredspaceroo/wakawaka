<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pokémon Battle</title>
<style>
  /* =====================================================
     POKEMON BATTLE GAME - Single File
     Aesthetic: Authentic GBA-era Pokemon feel
     - Pixel font, scanline overlay, retro UI chrome
  ===================================================== */

@import url(‘https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap’);

:root {
–gb-dark:    #1a1a2e;
–gb-mid:     #16213e;
–gb-panel:   #0f3460;
–gb-accent:  #e94560;
–gb-yellow:  #f5a623;
–gb-green:   #4caf50;
–gb-red:     #e53935;
–gb-blue:    #42a5f5;
–gb-white:   #f0f0f0;
–gb-gray:    #9e9e9e;
–gb-hp-green:#78c850;
–gb-hp-yel:  #f8d030;
–gb-hp-red:  #f08030;
–text-shadow: 2px 2px 0 #000;
–border-pixel: 3px solid #000;
}

- { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

body {
background: var(–gb-dark);
font-family: ‘Press Start 2P’, monospace;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
overflow: hidden;
position: relative;
}

/* Scanline overlay */
body::after {
content: ‘’;
position: fixed;
inset: 0;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0,0,0,0.08) 2px,
rgba(0,0,0,0.08) 4px
);
pointer-events: none;
z-index: 999;
}

/* Starfield bg */
#starfield {
position: fixed;
inset: 0;
z-index: 0;
overflow: hidden;
}

#game-wrapper {
position: relative;
z-index: 1;
width: min(480px, 100vw);
max-height: 100vh;
display: flex;
flex-direction: column;
}

/* ── TITLE SCREEN ───────────────────────────────── */
#title-screen {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 24px;
padding: 32px 16px;
min-height: 100vh;
}

.title-logo {
text-align: center;
line-height: 1.6;
}
.title-logo .poke { font-size: clamp(16px, 5vw, 28px); color: var(–gb-yellow); text-shadow: 4px 4px 0 #c47800, var(–text-shadow); letter-spacing: 4px; }
.title-logo .mon  { font-size: clamp(20px, 6vw, 36px); color: var(–gb-white); text-shadow: 4px 4px 0 #333, var(–text-shadow); letter-spacing: 6px; }
.title-logo .battle { font-size: clamp(10px, 3vw, 14px); color: var(–gb-accent); text-shadow: var(–text-shadow); letter-spacing: 8px; margin-top: 4px; }

.pixel-box {
border: var(–border-pixel);
border-radius: 8px;
box-shadow: 4px 4px 0 #000, inset 0 0 0 2px rgba(255,255,255,0.05);
background: var(–gb-mid);
padding: 16px;
}

/* Pokemon selector */
.starter-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
width: 100%;
}

.starter-card {
background: var(–gb-panel);
border: var(–border-pixel);
border-radius: 6px;
padding: 10px 6px;
cursor: pointer;
text-align: center;
transition: transform 0.1s, background 0.1s;
position: relative;
box-shadow: 3px 3px 0 #000;
}
.starter-card:hover, .starter-card.selected {
background: var(–gb-accent);
transform: translateY(-3px);
}
.starter-card canvas { display: block; margin: 0 auto 6px; }
.starter-card .name { font-size: 7px; color: var(–gb-white); text-shadow: var(–text-shadow); }
.starter-card .type-badge {
font-size: 5px;
color: #000;
padding: 2px 4px;
border-radius: 3px;
display: inline-block;
margin-top: 3px;
font-weight: bold;
}

/* ── BATTLE SCREEN ──────────────────────────────── */
#battle-screen {
display: none;
flex-direction: column;
width: 100%;
}

/* Battle field */
#battle-field {
background: linear-gradient(180deg, #87ceeb 0%, #87ceeb 55%, #98d870 55%, #78b840 70%, #6b8e4e 100%);
border: var(–border-pixel);
border-bottom: none;
position: relative;
height: 220px;
overflow: hidden;
}

/* Ground platforms */
.platform {
position: absolute;
height: 14px;
border-radius: 50%;
background: rgba(0,0,0,0.15);
bottom: 28%;
}
#plat-enemy { width: 90px; right: 60px; }
#plat-player { width: 110px; left: 50px; bottom: 8%; }

/* HP bars area */
.battle-info {
position: absolute;
background: var(–gb-white);
border: var(–border-pixel);
border-radius: 6px;
padding: 6px 10px;
min-width: 160px;
box-shadow: 3px 3px 0 #000;
}
#enemy-info { top: 12px; left: 12px; }
#player-info { bottom: 8px; right: 12px; }

.poke-name { font-size: 8px; color: #222; display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.poke-level { font-size: 6px; color: #555; }
.hp-label { font-size: 6px; color: #555; margin-bottom: 2px; }

.hp-bar-outer {
width: 100%;
height: 7px;
background: #ccc;
border: 2px solid #555;
border-radius: 0;
overflow: hidden;
}
.hp-bar-inner {
height: 100%;
transition: width 0.5s ease, background-color 0.5s;
background: var(–gb-hp-green);
}
.hp-numbers { font-size: 6px; color: #555; text-align: right; margin-top: 2px; }

/* Pokemon sprites (canvas) */
#enemy-sprite-canvas {
position: absolute;
right: 55px;
top: 20px;
image-rendering: pixelated;
}
#player-sprite-canvas {
position: absolute;
left: 30px;
bottom: 30px;
image-rendering: pixelated;
transform: scaleX(-1);
}

/* Damage flash */
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@keyframes shake-flip { 0%,100%{transform:scaleX(-1) translateX(0)} 25%{transform:scaleX(-1) translateX(-6px)} 75%{transform:scaleX(-1) translateX(6px)} }
@keyframes faint { to { opacity:0; transform: scaleX(-1) translateY(60px); } }
@keyframes faint-enemy { to { opacity:0; transform: translateY(60px); } }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.2} }

.shake { animation: shake 0.4s ease; }
.shake-player { animation: shake-flip 0.4s ease; }

/* ── BATTLE UI BOTTOM ───────────────────────────── */
#battle-ui {
background: var(–gb-white);
border: var(–border-pixel);
border-top: none;
min-height: 130px;
display: flex;
flex-direction: column;
}

/* Message box */
#message-box {
background: var(–gb-white);
border-bottom: var(–border-pixel);
padding: 10px 14px;
min-height: 60px;
position: relative;
}
#message-text {
font-size: 9px;
color: #111;
line-height: 1.8;
text-shadow: none;
}
#message-cursor {
display: inline-block;
width: 8px; height: 8px;
border-right: 3px solid #111;
border-bottom: 3px solid #111;
transform: rotate(45deg);
margin-left: 6px;
animation: blink-cursor 0.8s infinite;
vertical-align: middle;
}
@keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }

/* Action menu */
#action-menu {
display: grid;
grid-template-columns: 1fr 1fr;
border-bottom: var(–border-pixel);
}
.action-btn {
font-family: ‘Press Start 2P’, monospace;
font-size: 9px;
padding: 12px 8px;
border: none;
border-right: var(–border-pixel);
border-bottom: none;
cursor: pointer;
background: var(–gb-white);
color: #111;
transition: background 0.1s;
position: relative;
}
.action-btn:nth-child(even) { border-right: none; }
.action-btn:hover, .action-btn:active { background: #e8e8e8; }
.action-btn .arrow { margin-right: 6px; color: var(–gb-accent); }

/* Move menu */
#move-menu {
display: none;
grid-template-columns: 1fr 1fr;
}

.move-btn {
font-family: ‘Press Start 2P’, monospace;
font-size: 7px;
padding: 10px 8px;
border: none;
border-right: var(–border-pixel);
border-bottom: var(–border-pixel);
cursor: pointer;
background: var(–gb-white);
color: #111;
text-align: left;
transition: background 0.1s;
}
.move-btn:nth-child(even) { border-right: none; }
.move-btn:nth-last-child(-n+2) { border-bottom: none; }
.move-btn:hover { background: #ddf; }
.move-btn .move-type {
font-size: 5px;
padding: 1px 3px;
border-radius: 2px;
display: inline-block;
margin-top: 3px;
color: #fff;
}
.move-btn .move-pp { font-size: 5px; color: #666; float: right; }
.move-btn.no-pp { color: #aaa; }

/* Back button */
#back-btn {
display: none;
font-family: ‘Press Start 2P’, monospace;
font-size: 8px;
padding: 10px;
border: none;
border-top: var(–border-pixel);
cursor: pointer;
background: #f0f0f0;
color: #555;
text-align: center;
width: 100%;
}
#back-btn:hover { background: #e0e0e0; }

/* Type colors */
.type-fire    { background: #f08030; }
.type-water   { background: #6890f0; }
.type-grass   { background: #78c850; }
.type-electric{ background: #f8d030; color: #000 !important; }
.type-psychic { background: #f85888; }
.type-ice     { background: #98d8d8; color: #000 !important; }
.type-normal  { background: #a8a878; }
.type-fighting{ background: #c03028; }
.type-poison  { background: #a040a0; }
.type-ground  { background: #e0c068; color: #000 !important; }
.type-flying  { background: #a890f0; }
.type-bug     { background: #a8b820; }
.type-rock    { background: #b8a038; }
.type-ghost   { background: #705898; }
.type-dragon  { background: #7038f8; }
.type-dark    { background: #705848; }
.type-steel   { background: #b8b8d0; color: #000 !important; }

/* ── RESULT SCREEN ──────────────────────────────── */
#result-screen {
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
padding: 32px 16px;
min-height: 100vh;
text-align: center;
}
#result-title { font-size: clamp(16px, 5vw, 24px); text-shadow: var(–text-shadow); }
.win  { color: var(–gb-yellow); }
.lose { color: var(–gb-accent); }
.draw { color: var(–gb-gray); }

#result-msg { font-size: 9px; color: var(–gb-white); line-height: 2; max-width: 340px; }

/* Buttons */
.gb-btn {
font-family: ‘Press Start 2P’, monospace;
font-size: 9px;
padding: 12px 20px;
background: var(–gb-accent);
color: #fff;
border: var(–border-pixel);
border-radius: 4px;
cursor: pointer;
box-shadow: 4px 4px 0 #000;
transition: transform 0.1s, box-shadow 0.1s;
text-transform: uppercase;
}
.gb-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #000; }
.gb-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #000; }
.gb-btn.secondary { background: var(–gb-panel); }

.section-label { font-size: 8px; color: var(–gb-yellow); text-shadow: var(–text-shadow); margin-bottom: 6px; }

/* ── POKEMON SPRITES via Canvas ─────────────────── */
/* Sprites are procedurally drawn - each Pokemon has
a unique pixel art profile */

/* Particles */
#particle-canvas {
position: absolute;
inset: 0;
pointer-events: none;
z-index: 10;
}

/* ── EXP bar ──────────────────────────────────────*/
.exp-bar-outer {
width: 100%;
height: 4px;
background: #ddd;
border: 1px solid #888;
margin-top: 4px;
}
.exp-bar-inner {
height: 100%;
background: #5090d0;
transition: width 0.6s ease;
}

/* Status badges */
.status-badge {
font-size: 5px;
padding: 1px 3px;
border-radius: 2px;
display: inline-block;
margin-left: 4px;
font-weight: bold;
color: #fff;
}
.status-PSN { background: #a040a0; }
.status-BRN { background: #f08030; }
.status-PAR { background: #f8d030; color: #000; }
.status-SLP { background: #7b8f8f; }
.status-FRZ { background: #98d8d8; color: #000; }

/* Mobile tweaks */
@media (max-width: 420px) {
#battle-field { height: 185px; }
.action-btn { font-size: 7px; padding: 10px 6px; }
.move-btn { font-size: 6px; }
}
</style>

</head>

<script>
// ╔══════════════════════════════════════════════════════════════╗
//   POKEMON BATTLE ENGINE
//   - 15 unique Pokemon with full move sets
//   - Type effectiveness chart
//   - Status effects (PSN, BRN, PAR, SLP, FRZ)
//   - Item bag (potions, revives)
//   - AI opponent with basic strategy
//   - Particle effects for moves
//   - Procedural pixel-art sprites drawn on canvas
// ╚══════════════════════════════════════════════════════════════╝

'use strict';

// ── TYPE CHART ───────────────────────────────────────────────
const TYPE_CHART = {
  fire:     { grass:2, ice:2, bug:2, steel:2, water:0.5, fire:0.5, rock:0.5, dragon:0.5 },
  water:    { fire:2, ground:2, rock:2, water:0.5, grass:0.5, dragon:0.5 },
  grass:    { water:2, ground:2, rock:2, fire:0.5, grass:0.5, poison:0.5, flying:0.5, bug:0.5, dragon:0.5, steel:0.5 },
  electric: { water:2, flying:2, grass:0.5, electric:0.5, dragon:0.5, ground:0 },
  ice:      { grass:2, ground:2, flying:2, dragon:2, fire:0.5, water:0.5, ice:0.5, steel:0.5 },
  fighting: { normal:2, ice:2, rock:2, dark:2, steel:2, poison:0.5, flying:0.5, psychic:0.5, bug:0.5, ghost:0 },
  poison:   { grass:2, fairy:2, poison:0.5, ground:0.5, rock:0.5, ghost:0.5, steel:0 },
  ground:   { fire:2, electric:2, poison:2, rock:2, steel:2, grass:0.5, bug:0.5, flying:0 },
  flying:   { grass:2, fighting:2, bug:2, electric:0.5, rock:0.5, steel:0.5 },
  psychic:  { fighting:2, poison:2, psychic:0.5, steel:0.5, dark:0, ghost:0 },
  bug:      { grass:2, psychic:2, dark:2, fire:0.5, fighting:0.5, flying:0.5, ghost:0.5, steel:0.5 },
  rock:     { fire:2, ice:2, flying:2, bug:2, fighting:0.5, ground:0.5, steel:0.5 },
  ghost:    { psychic:2, ghost:2, normal:0, fighting:0, dark:0.5 },
  dragon:   { dragon:2, steel:0.5, fairy:0 },
  dark:     { psychic:2, ghost:2, fighting:0.5, dark:0.5, fairy:0.5 },
  steel:    { ice:2, rock:2, fairy:2, fire:0.5, water:0.5, electric:0.5, steel:0.5 },
  normal:   { rock:0.5, steel:0.5, ghost:0 },
  fairy:    { fighting:2, dragon:2, dark:2, fire:0.5, poison:0.5, steel:0.5 },
};

function typeEffectiveness(moveType, defenderTypes) {
  let mult = 1;
  defenderTypes.forEach(t => {
    const row = TYPE_CHART[moveType] || {};
    if (row[t] !== undefined) mult *= row[t];
  });
  return mult;
}

// ── MOVE DATABASE ────────────────────────────────────────────
const MOVES = {
  // Fire
  ember:         { name:'Ember',        type:'fire',     power:40, accuracy:100, pp:25, category:'special', effect:null },
  flamethrower:  { name:'Flamethrower', type:'fire',     power:90, accuracy:100, pp:15, category:'special', effect:{chance:10,status:'BRN'} },
  fireblast:     { name:'Fire Blast',   type:'fire',     power:110,accuracy:85,  pp:5,  category:'special', effect:{chance:10,status:'BRN'} },

  surf:          { name:'Surf',         type:'water',    power:90, accuracy:100, pp:15, category:'special', effect:null },
  hydropump:     { name:'Hydro Pump',   type:'water',    power:110,accuracy:80,  pp:5,  category:'special', effect:null },
  bubble:        { name:'Bubble',       type:'water',    power:40, accuracy:100, pp:30, category:'special', effect:{chance:10,stat:'spd',stages:-1} },
  // Grass
  vinewhip:      { name:'Vine Whip',    type:'grass',    power:45, accuracy:100, pp:25, category:'physical',effect:null },

  // Electric
  thundershock:  { name:'ThunderShock', type:'electric', power:40, accuracy:100, pp:30, category:'special', effect:{chance:10,status:'PAR'} },
  thunderbolt:   { name:'Thunderbolt',  type:'electric', power:90, accuracy:100, pp:15, category:'special', effect:{chance:10,status:'PAR'} },
  thunder:       { name:'Thunder',      type:'electric', power:110,accuracy:70,  pp:10, category:'special', effect:{chance:30,status:'PAR'} },
  spark:         { name:'Spark',        type:'electric', power:65, accuracy:100, pp:20, category:'physical',effect:{chance:30,status:'PAR'} },
  // Normal
  tackle:        { name:'Tackle',       type:'normal',   power:40, accuracy:100, pp:35, category:'physical',effect:null },
  scratch:       { name:'Scratch',      type:'normal',   power:40, accuracy:100, pp:35, category:'physical',effect:null },
  slash:         { name:'Slash',        type:'normal',   power:70, accuracy:100, pp:20, category:'physical',effect:null, critHigh:true },
  bodyslam:      { name:'Body Slam',    type:'normal',   power:85, accuracy:100, pp:15, category:'physical',effect:{chance:30,status:'PAR'} },
  hyperbeam:     { name:'Hyper Beam',   type:'normal',   power:150,accuracy:90,  pp:5,  category:'special', effect:null },
  // Psychic

// ── PARTICLE SYSTEM ──────────────────────────────────────────
class ParticleSystem {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.particles = [];
    this.running = false;
    this._raf = null;
    this.resize();
  }
  resize() {
    this.canvas.width  = this.canvas.parentElement.offsetWidth;
    this.canvas.height = this.canvas.parentElement.offsetHeight;
  }
  emit(type, x, y) {
    const configs = {
      fire:     { n:18, color:['#f85000','#f8a000','#fff8a0','#ffffff'], size:[4,12], life:[0.6,1.0], vx:[-2,2], vy:[-4,-1] },
      water:    { n:15, color:['#4090f8','#90d0ff','#ffffff'],           size:[4,10], life:[0.5,0.9], vx:[-3,3], vy:[-3,1] },
      grass:    { n:14, color:['#50d050','#a0f870','#f0fff0'],           size:[4,10], life:[0.5,0.8], vx:[-2,2], vy:[-4,-1] },
      electric: { n:20, color:['#f8e000','#f8f880','#ffffff'],           size:[2,8],  life:[0.3,0.6], vx:[-4,4], vy:[-4,4] },
      ice:      { n:16, color:['#98e8f8','#c0f8f8','#ffffff'],           size:[3,9],  life:[0.6,1.0], vx:[-3,3], vy:[-3,2] },
      psychic:  { n:14, color:['#f870a8','#f8c0d8','#ffffff'],           size:[4,12], life:[0.6,1.0], vx:[-2,2], vy:[-4,-1] },
      normal:   { n:12, color:['#c8c8c8','#e8e8e8','#ffffff'],           size:[3,8],  life:[0.4,0.7], vx:[-3,3], vy:[-3,1] },
      poison:   { n:14, color:['#c040c0','#e880e8','#ffffff'],           size:[4,10], life:[0.5,0.9], vx:[-2,2], vy:[-3,1] },
      ground:   { n:16, color:['#e0c068','#c0a040','#806020'],           size:[4,10], life:[0.5,0.9], vx:[-3,3], vy:[-2,2] },
      rock:     { n:12, color:['#b8a038','#d8c050','#f0e080'],           size:[5,12], life:[0.4,0.8], vx:[-4,4], vy:[-4,1] },
      ghost:    { n:14, color:['#705898','#a080c8','#d0b8f8'],           size:[6,16], life:[0.8,1.4], vx:[-1,1], vy:[-3,0] },
      dragon:   { n:16, color:['#7038f8','#a060f8','#c8a0f8'],           size:[5,14], life:[0.7,1.2], vx:[-2,2], vy:[-4,-1] },
      dark:     { n:14, color:['#705848','#a08070','#c0b0a0'],           size:[4,10], life:[0.5,0.9], vx:[-3,3], vy:[-3,1] },
      fighting: { n:14, color:['#c03028','#e05040','#f09080'],           size:[4,10], life:[0.4,0.8], vx:[-4,4], vy:[-4,0] },
      flying:   { n:14, color:['#a890f0','#c8b0f8','#e8d8ff'],           size:[3,9],  life:[0.5,0.9], vx:[-3,3], vy:[-4,-1] },
    };
    const cfg = configs[type] || configs.normal;
    const R = (a,b) => a + Math.random()*(b-a);
    for (let i = 0; i < cfg.n; i++) {
      this.particles.push({
        x, y,
        vx: R(...cfg.vx),
        vy: R(...cfg.vy),
        size: R(...cfg.size),
        color: cfg.color[Math.floor(Math.random()*cfg.color.length)],
        life: R(...cfg.life),
        maxLife: R(...cfg.life),
        gravity: 0.12,
      });
    }
    if (!this.running) this._loop();
  }
  _loop() {
    this.running = true;
    const tick = () => {
      this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
      this.particles = this.particles.filter(p => p.life > 0);
      for (const p of this.particles) {
        p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.life -= 0.02;
        const alpha = Math.max(0, p.life / p.maxLife);
        this.ctx.globalAlpha = alpha;
        this.ctx.fillStyle = p.color;
        this.ctx.beginPath();
        this.ctx.arc(p.x, p.y, Math.max(1, p.size*alpha), 0, Math.PI*2);
        this.ctx.fill();
      }
      this.ctx.globalAlpha = 1;
      if (this.particles.length > 0) this._raf = requestAnimationFrame(tick);
      else this.running = false;
    };
    this._raf = requestAnimationFrame(tick);
  }
}

function fillRect(ctx, S, color, px, py, pw, ph) {
  ctx.fillStyle = color;
  ctx.fillRect(px*S, py*S, pw*S, ph*S);
}
function outlineSprite(ctx, S, px, py, pw, ph) {
  ctx.strokeStyle = '#111111';
  ctx.lineWidth = S * 0.6;
  ctx.strokeRect(px*S + ctx.lineWidth/2, py*S + ctx.lineWidth/2,
    pw*S - ctx.lineWidth, ph*S - ctx.lineWidth);
}

function drawSprite(canvas, pokemonName, size = 96) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,size,size);
  const S = size / 16;
  const fn = SPRITE_DEFS[pokemonName.toLowerCase()];
  if (fn) fn(ctx, S);
  else {
    // Fallback generic blob
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(size/2, size/2, size/3, 0, Math.PI*2);
    ctx.fill();
  }
}

// ── GAME STATE ───────────────────────────────────────────────
let G = {};  // Game object

function createBattlePokemon(pokemonDef, level = 5) {
  const base = pokemonDef.baseStats;
  const maxHP = Math.floor((2*base.hp * level) / 100 + level + 10);
  const atk   = Math.floor((2*base.atk * level) / 100 + 5);
  const def   = Math.floor((2*base.def * level) / 100 + 5);
  const spa   = Math.floor((2*base.spa * level) / 100 + 5);
  const spd   = Math.floor((2*base.spd * level) / 100 + 5);

  return {
    ...pokemonDef,
    level,
    maxHP, hp: maxHP,
    atk, def, spa, spd,
    moves: pokemonDef.moves.map(m => ({
      ...MOVES[m],
      id: m,
      currentPP: MOVES[m] ? MOVES[m].pp : 10
    })).filter(m => m.name),
    status: null,      // PSN BRN PAR SLP FRZ
    statusTurns: 0,
    statStages: { atk:0, def:0, spa:0, spd:0, acc:0, eva:0 },
    fainted: false,
    exp: 0,
  };
}

function getStageMult(stage) {
  const table = [0.25, 0.28, 0.33, 0.4, 0.5, 0.66, 1, 1.5, 2, 2.5, 3, 3.5, 4];
  return table[Math.min(12, Math.max(0, stage + 6))];
}

function calcDamage(attacker, defender, move) {
  if (move.power === 0) return 0;
  if (move.effect && move.effect.fixedDmg) {
    return move.effect.fixedAmt || attacker.level;
  }
  const isSpecial = move.category === 'special';
  const atkStat = isSpecial
    ? attacker.spa * getStageMult(attacker.statStages.spa)
    : attacker.atk * getStageMult(attacker.statStages.atk);
  const defStat = isSpecial
    ? defender.spa * getStageMult(defender.statStages.spa)
    : defender.def * getStageMult(defender.statStages.def);

  let baseDmg = Math.floor((2 * attacker.level / 5 + 2) * move.power * atkStat / defStat / 50) + 2;

  // STAB
  if (attacker.types.includes(move.type)) baseDmg = Math.floor(baseDmg * 1.5);

  // Type effectiveness
  const eff = typeEffectiveness(move.type, defender.types);
  baseDmg = Math.floor(baseDmg * eff);

  // Critical hit
  const critChance = move.critHigh ? 0.25 : 0.0625;
  if (Math.random() < critChance) baseDmg = Math.floor(baseDmg * 1.5);

  // Random factor (85%-100%)
  baseDmg = Math.floor(baseDmg * (0.85 + Math.random() * 0.15));

  return Math.max(1, baseDmg);
}

function getEffMessage(eff) {
  if (eff === 0) return "It had no effect!";
  if (eff >= 2) return "It's super effective!";
  if (eff <= 0.5) return "It's not very effective...";
  return null;
}

// ── UI HELPERS ───────────────────────────────────────────────
let msgQueue = [];
let msgBusy = false;

function queueMsg(text, delay = 1200) {
  return new Promise(resolve => msgQueue.push({ text, delay, resolve }));
}

function processQueue() {
  if (msgBusy || msgQueue.length === 0) return;
  msgBusy = true;
  const { text, delay, resolve } = msgQueue.shift();
  const el = document.getElementById('message-text');
  el.innerHTML = text + ' <span id="message-cursor"></span>';
  setTimeout(() => {
    msgBusy = false;
    resolve();
    processQueue();
  }, delay);
}

async function showMsg(text, delay = 1200) {
  await queueMsg(text, delay);
  processQueue();
}

function updateHPBar(who, animate = true) {
  const poke = G[who];
  const pct = Math.max(0, poke.hp / poke.maxHP) * 100;
  const bar = document.getElementById(`${who}-hp-bar`);
  const nums = document.getElementById(`${who}-hp-numbers`);
  bar.style.width = pct + '%';
  bar.style.backgroundColor = pct > 50 ? 'var(--gb-hp-green)' : pct > 25 ? 'var(--gb-hp-yel)' : 'var(--gb-hp-red)';
  if (who === 'player') nums.textContent = `${Math.max(0,poke.hp)}/${poke.maxHP}`;
  else nums.textContent = '';
}

function updateStatusBadge(who) {
  const poke = G[who];
  const el = document.getElementById(`${who}-status`);
  if (poke.status) {
    el.innerHTML = `<span class="status-badge status-${poke.status}">${poke.status}</span>`;
  } else {
    el.textContent = '';
  }
}

function setMenuVisible(actionVisible, moveVisible) {
  document.getElementById('action-menu').style.display = actionVisible ? 'grid' : 'none';
  document.getElementById('move-menu').style.display = moveVisible ? 'grid' : 'none';
  document.getElementById('back-btn').style.display = moveVisible ? 'block' : 'none';
}

function rebuildMoveMenu() {
  const menu = document.getElementById('move-menu');
  menu.innerHTML = '';
  G.player.moves.forEach((move, i) => {
    const btn = document.createElement('button');
    btn.className = 'move-btn' + (move.currentPP <= 0 ? ' no-pp' : '');
    btn.innerHTML = `${move.name}<span class="move-type type-${move.type}">${move.type.toUpperCase()}</span><span class="move-pp">${move.currentPP}/${move.pp} PP</span>`;
    btn.disabled = move.currentPP <= 0;
    btn.addEventListener('click', () => {

// ── STARFIELD ────────────────────────────────────────────────
function initStarfield() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const stars = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5+0.3,
    speed: Math.random()*0.3+0.05,
    alpha: Math.random()
  }));
  function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (const s of stars) {
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
      s.y += s.speed;
      s.alpha = 0.3 + 0.7*Math.abs(Math.sin(Date.now()/2000 + s.x));
      if (s.y > canvas.height) { s.y = 0; s.x = Math.random()*canvas.width; }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  loop();
}

// ── TITLE SCREEN SETUP ───────────────────────────────────────
let selectedPlayer = null;
let selectedOpponent = null;

function initTitleScreen() {
  const sg = document.getElementById('starter-grid');
  const og = document.getElementById('opponent-grid');
  sg.innerHTML = ''; og.innerHTML = '';

  POKEMON.forEach((p, i) => {
    const card = makePokeCard(p, 'player', i);
    sg.appendChild(card);
  });
  POKEMON.forEach((p, i) => {
    const card = makePokeCard(p, 'opponent', i);
    og.appendChild(card);
  });

}

function makePokeCard(p, who, idx) {
  const card = document.createElement('div');
  card.className = 'starter-card';
  card.dataset.idx = idx;

  const c = document.createElement('canvas');
  c.width = 48; c.height = 48;
  drawSprite(c, p.sprite, 48);
  card.appendChild(c);

  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = p.name;
  card.appendChild(name);

  const typeBadge = document.createElement('span');
  typeBadge.className = `type-badge type-${p.types[0]}`;
  typeBadge.textContent = p.types[0].toUpperCase();
  card.appendChild(typeBadge);

  card.addEventListener('click', () => {
    if (who === 'player') {
      document.querySelectorAll('#starter-grid .starter-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedPlayer = idx;
    } else {
      document.querySelectorAll('#opponent-grid .starter-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedOpponent = idx;
    }
    if (selectedPlayer !== null && selectedOpponent !== null) {
      document.getElementById('start-btn').disabled = false;
    }
  });
  return card;
}

// ── BATTLE SETUP ─────────────────────────────────────────────

  }

// ── BATTLE ACTIONS ───────────────────────────────────────────
async function playerUsesMove(moveIdx) {
  if (!G.battleActive || G.animating) return;
  G.animating = true;
  setMenuVisible(false, false);

  const move = G.player.moves[moveIdx];
  if (!move || move.currentPP <= 0) {
    await showMsg(`No PP left!`, 900);
    setMenuVisible(false, true);
    G.animating = false;
    return;
  }
  move.currentPP--;

  // Check status before moving
  if (G.player.status === 'PAR' && Math.random() < 0.25) {
    await showMsg(`${G.player.name} is paralyzed! It can't move!`, 1200);
    await enemyTurn();
    return;
  }
  if (G.player.status === 'SLP') {
    G.player.statusTurns--;
    if (G.player.statusTurns > 0) {
      await showMsg(`${G.player.name} is fast asleep!`, 1200);
      await enemyTurn();
      return;
    } else {
      G.player.status = null;
      updateStatusBadge('player');
      await showMsg(`${G.player.name} woke up!`, 1200);
    }
  }
  if (G.player.status === 'FRZ') {
    if (Math.random() < 0.8) {
      await showMsg(`${G.player.name} is frozen solid!`, 1200);
      await enemyTurn();
      return;
    } else {
      G.player.status = null;
      updateStatusBadge('player');
      await showMsg(`${G.player.name} thawed out!`, 1200);
    }
  }

  await executeMove(G.player, G.enemy, move, 'player');
  if (!G.battleActive) return;

  // Check enemy fainted
  if (G.enemy.hp <= 0) {
    G.enemy.hp = 0;
    G.enemy.fainted = true;
    updateHPBar('enemy');
    const enemySprite = document.getElementById('enemy-sprite-canvas');
    enemySprite.style.animation = 'faint-enemy 0.5s forwards';
    await showMsg(`Enemy ${G.enemy.name} fainted!`, 1400);
    G.battleActive = false;
    G.animating = false;
    setTimeout(() => showResult('win'), 800);
    return;
  }

  await enemyTurn();
}

async function enemyTurn() {
  if (!G.battleActive) return;

  // Enemy status
  if (G.enemy.status === 'PAR' && Math.random() < 0.25) {
    await showMsg(`Enemy ${G.enemy.name} is paralyzed!`, 1200);
  } else if (G.enemy.status === 'SLP') {
    G.enemy.statusTurns--;
    if (G.enemy.statusTurns > 0) {
      await showMsg(`Enemy ${G.enemy.name} is fast asleep!`, 1200);
    } else {
      G.enemy.status = null;
      updateStatusBadge('enemy');
      await showMsg(`Enemy ${G.enemy.name} woke up!`, 1200);
    }
    await endOfTurn();
    return;
  } else if (G.enemy.status === 'FRZ' && Math.random() < 0.8) {
    await showMsg(`Enemy ${G.enemy.name} is frozen!`, 1200);
    await endOfTurn();
    return;
  } else {
    // AI: pick best move
    const move = aiPickMove(G.enemy, G.player);
    if (move) await executeMove(G.enemy, G.player, move, 'enemy');
  }

  if (!G.battleActive) return;

  // Check player fainted
  if (G.player.hp <= 0) {
    G.player.hp = 0;
    G.player.fainted = true;
    updateHPBar('player');
    const playerSprite = document.getElementById('player-sprite-canvas');
    playerSprite.style.animation = 'faint 0.5s forwards';
    await showMsg(`${G.player.name} fainted!`, 1400);
    G.battleActive = false;
    G.animating = false;
    setTimeout(() => showResult('lose'), 800);
    return;
  }

  await endOfTurn();
}

async function endOfTurn() {
  G.turn++;

  // Burn damage
  if (G.player.status === 'BRN') {
    const dmg = Math.max(1, Math.floor(G.player.maxHP / 8));
    G.player.hp = Math.max(0, G.player.hp - dmg);
    updateHPBar('player');
    await showMsg(`${G.player.name} is hurt by its burn!`, 1000);
  }
  if (G.enemy.status === 'BRN') {
    const dmg = Math.max(1, Math.floor(G.enemy.maxHP / 8));
    G.enemy.hp = Math.max(0, G.enemy.hp - dmg);
    updateHPBar('enemy');
    await showMsg(`Enemy ${G.enemy.name} is hurt by its burn!`, 1000);
  }
  // Poison damage
  if (G.player.status === 'PSN') {
    const dmg = Math.max(1, Math.floor(G.player.maxHP / 8));
    G.player.hp = Math.max(0, G.player.hp - dmg);
    updateHPBar('player');
    await showMsg(`${G.player.name} is hurt by poison!`, 1000);
  }
  if (G.enemy.status === 'PSN') {
    const dmg = Math.max(1, Math.floor(G.enemy.maxHP / 8));
    G.enemy.hp = Math.max(0, G.enemy.hp - dmg);
    updateHPBar('enemy');
    await showMsg(`Enemy ${G.enemy.name} is hurt by poison!`, 1000);
  }

  // Check deaths from end-of-turn
  if (G.player.hp <= 0 && G.battleActive) {
    G.player.hp = 0; G.player.fainted = true; updateHPBar('player');
    document.getElementById('player-sprite-canvas').style.animation = 'faint 0.5s forwards';
    await showMsg(`${G.player.name} fainted!`, 1400);
    G.battleActive = false; G.animating = false;
    setTimeout(() => showResult('lose'), 800); return;
  }
  if (G.enemy.hp <= 0 && G.battleActive) {
    G.enemy.hp = 0; G.enemy.fainted = true; updateHPBar('enemy');
    document.getElementById('enemy-sprite-canvas').style.animation = 'faint-enemy 0.5s forwards';
    await showMsg(`Enemy ${G.enemy.name} fainted!`, 1400);
    G.battleActive = false; G.animating = false;
    setTimeout(() => showResult('win'), 800); return;
  }

  if (G.battleActive) {
    document.getElementById('msg-pokemon-name').textContent = G.player.name;
    const txt = `What will ${G.player.name} do?`;
    document.getElementById('message-text').innerHTML = txt + ' <span id="message-cursor"></span>';
    setMenuVisible(true, false);
    G.animating = false;
  }
}

async function executeMove(attacker, defender, move, who) {
  const isPlayer = who === 'player';
  const prefix = isPlayer ? '' : 'Enemy ';
  const targetPrefix = isPlayer ? 'Enemy ' : '';
  const attackerSprite = document.getElementById(`${who}-sprite-canvas`);
  const defenderSide = isPlayer ? 'enemy' : 'player';
  const defenderSprite = document.getElementById(`${defenderSide}-sprite-canvas`);

  await showMsg(`${prefix}${attacker.name} used ${move.name}!`, 900);

  // Accuracy check
  const accMult = getStageMult(attacker.statStages.acc || 0) / getStageMult(defender.statStages.eva || 0);
  if (Math.random() * 100 > move.accuracy * accMult) {
    await showMsg(`${prefix}${attacker.name}'s attack missed!`, 1000);
    return;
  }

  // Emit particles at defender location
  const fieldEl = document.getElementById('battle-field');
  const fx = defenderSide === 'enemy'
    ? fieldEl.offsetWidth * 0.7
    : fieldEl.offsetWidth * 0.3;
  const fy = defenderSide === 'enemy'
    ? fieldEl.offsetHeight * 0.35
    : fieldEl.offsetHeight * 0.65;
  G.particles.emit(move.type, fx, fy);

  if (move.category === 'status') {
    // Handle stat changes / status infliction
    const eff = move.effect;
    if (eff) {
      if (eff.heal) {
        const healAmt = Math.floor(attacker.maxHP * eff.heal);
        attacker.hp = Math.min(attacker.maxHP, attacker.hp + healAmt);
        updateHPBar(who);
        await showMsg(`${prefix}${attacker.name} recovered HP!`, 1000);
      } else if (eff.status) {
        const target = eff.self ? attacker : defender;
        const targetStr = eff.self ? `${prefix}${attacker.name}` : `${targetPrefix}${defender.name}`;
        if (!target.status) {
          if (eff.status === 'leech') {
            // Just do poison-like
            target.status = 'PSN';
          } else {
            target.status = eff.status;
            if (eff.status === 'SLP') target.statusTurns = 2 + Math.floor(Math.random()*3);
          }
          updateStatusBadge(eff.self ? who : defenderSide);
          const statusNames = { PSN:'was poisoned', BRN:'was burned', PAR:'was paralyzed', SLP:'fell asleep', FRZ:'was frozen' };
          await showMsg(`${targetStr} ${statusNames[target.status] || 'was affected'}!`, 1000);
        } else {
          await showMsg(`It didn't work!`, 800);
        }
      } else if (eff.stat) {
        const target = eff.self ? attacker : defender;
        const targetStr = eff.self ? `${prefix}${attacker.name}` : `${targetPrefix}${defender.name}`;
        const stages = eff.stages || -1;
        const statName = {atk:'Attack',def:'Defense',spa:'Sp.Atk',spd:'Speed',acc:'Accuracy',eva:'Evasion'};
        target.statStages[eff.stat] = Math.max(-6, Math.min(6, (target.statStages[eff.stat]||0) + stages));
        const dir = stages > 0 ? 'rose' : 'fell';
        const amount = Math.abs(stages) > 1 ? ' sharply' : '';
        await showMsg(`${targetStr}'s ${statName[eff.stat]}${amount} ${dir}!`, 1000);
      } else if (eff.disable) {
        await showMsg(`It had no effect...`, 800);
      } else {
        await showMsg(`...`, 600);
      }
    }
    return;
  }

  // Damage move
  const dmg = calcDamage(attacker, defender, move);
  const eff = typeEffectiveness(move.type, defender.types);
  const effMsg = getEffMessage(eff);

  // Shake defender
  if (isPlayer) {
    defenderSprite.classList.remove('shake');
    void defenderSprite.offsetWidth;
    defenderSprite.classList.add('shake');
  } else {
    defenderSprite.classList.remove('shake-player');
    void defenderSprite.offsetWidth;
    defenderSprite.classList.add('shake-player');
  }
  setTimeout(() => {
    defenderSprite.classList.remove('shake','shake-player');
  }, 450);

  defender.hp = Math.max(0, defender.hp - dmg);
  updateHPBar(defenderSide);

  if (effMsg) await showMsg(effMsg, 900);

  // Secondary effects
  if (move.effect && !move.effect.fixedDmg && !move.effect.heal && !move.effect.disable) {
    const e = move.effect;
    if (e.chance && Math.random()*100 < e.chance) {
      if (e.status && !defender.status) {
        defender.status = e.status;
        if (e.status === 'SLP') defender.statusTurns = 2 + Math.floor(Math.random()*3);
        updateStatusBadge(defenderSide);
        const statusNames = { PSN:'was poisoned', BRN:'was burned', PAR:'was paralyzed', SLP:'fell asleep', FRZ:'was frozen' };
        await showMsg(`${targetPrefix}${defender.name} ${statusNames[e.status]}!`, 1000);
      } else if (e.stat) {
        defender.statStages[e.stat] = Math.max(-6, Math.min(6, (defender.statStages[e.stat]||0) + (e.stages||0)));
        const statName = {atk:'Attack',def:'Defense',spa:'Sp.Atk',spd:'Speed',acc:'Accuracy'};
        await showMsg(`${targetPrefix}${defender.name}'s ${statName[e.stat]} fell!`, 900);
      }
    }
  }
}

// ── AI ───────────────────────────────────────────────────────
function aiPickMove(enemy, player) {
  const available = enemy.moves.filter(m => m.currentPP > 0);
  if (available.length === 0) return { name:'Struggle', type:'normal', power:50, accuracy:100, pp:1, currentPP:1, category:'physical', effect:null };

  // Score each move
  const scored = available.map(move => {
    let score = 0;
    if (move.category !== 'status') {
      const dmg = calcDamage(enemy, player, move);
      const eff = typeEffectiveness(move.type, player.types);
      score = dmg * 2 + eff * 10;
      // Prefer KO
      if (dmg >= player.hp) score += 100;
    } else {
      // Status moves: useful if enemy healthy and target has no status
      if (enemy.hp > enemy.maxHP * 0.5 && !player.status) score = 30;
      else score = 5;
    }
    return { move, score };
  });

  scored.sort((a,b) => b.score - a.score);

  // Some randomness so AI isn't perfect
  const top = scored.slice(0, Math.min(2, scored.length));
  return top[Math.floor(Math.random()*top.length)].move;
}

// ── BAG ──────────────────────────────────────────────────────
function showBagMenu() {
  if (!G.battleActive || G.animating) return;
  setMenuVisible(false, false);

  const menu = document.getElementById('move-menu');
  menu.innerHTML = '';
  menu.style.display = 'grid';
  document.getElementById('back-btn').style.display = 'block';

  const items = Object.entries(G.bag).filter(([k,v]) => v > 0);
  if (items.length === 0) {
    showMsg(`Your bag is empty!`, 1000);
    setMenuVisible(true, false);
    return;
  }

  items.forEach(([key, qty]) => {
    const item = ITEMS[key];
    if (!item) return;
    const btn = document.createElement('button');
    btn.className = 'move-btn';
    btn.innerHTML = `${item.name}<span class="move-pp">${qty}x</span><br><span style="font-size:5px;color:#888">${item.desc}</span>`;
    btn.addEventListener('click', async () => {
      if (!G.battleActive || G.animating) return;
      G.animating = true;
      G.bag[key]--;

      if (item.cureStatus === true) {
        G.player.status = null;
        updateStatusBadge('player');
        await showMsg(`Used ${item.name}! ${G.player.name} is cured!`, 1200);
      } else if (item.cureStatus) {
        if (G.player.status === item.cureStatus) {
          G.player.status = null;
          updateStatusBadge('player');
          await showMsg(`Used ${item.name}! Cured ${item.cureStatus}!`, 1200);
        } else {
          await showMsg(`It won't work on ${G.player.name}!`, 1000);
          G.bag[key]++; // refund
        }
      } else if (item.heal) {
        if (G.player.hp >= G.player.maxHP) {
          await showMsg(`${G.player.name} is already at full HP!`, 1000);
          G.bag[key]++;
        } else {
          G.player.hp = Math.min(G.player.maxHP, G.player.hp + item.heal);
          updateHPBar('player');
          await showMsg(`Used ${item.name}! Restored ${item.heal} HP!`, 1200);
        }
      }

      await enemyTurn();
    });
    menu.appendChild(btn);
  });
}

// ── RESULT SCREEN ────────────────────────────────────────────
function showResult(outcome) {
  document.getElementById('battle-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';

  const title = document.getElementById('result-title');
  const msg = document.getElementById('result-msg');
  const sprite = document.getElementById('result-sprite');

  if (outcome === 'win') {
    title.textContent = 'VICTORY!';
    title.className = 'win';
    msg.textContent = `${G.player.name} defeated the enemy ${G.enemy.name}!\nYou are a Pokémon master!`;
    drawSprite(sprite, G.player.sprite, 128);
  } else if (outcome === 'lose') {
    title.textContent = 'DEFEATED!';
    title.className = 'lose';
    msg.textContent = `${G.player.name} was defeated by enemy ${G.enemy.name}...\nTrain harder and try again!`;
    drawSprite(sprite, G.enemy.sprite, 128);
  } else {
    title.textContent = 'ESCAPED!';
    title.className = 'draw';
    msg.textContent = 'You fled from the battle.\nSometimes discretion is the better part of valor.';
    drawSprite(sprite, G.player.sprite, 128);
  }

  document.getElementById('rematch-btn').onclick = () => {
    rs.style.display = 'none';
    // Reset state and restart same matchup
    document.getElementById('battle-screen').style.display = 'none';
    startBattle();
  };
  document.getElementById('new-game-btn').onclick = () => {
    rs.style.display = 'none';
    document.getElementById('title-screen').style.display = 'flex';
    selectedPlayer = null; selectedOpponent = null;
    document.getElementById('start-btn').disabled = true;
    document.querySelectorAll('.starter-card').forEach(c => c.classList.remove('selected'));
    // Reset sprite animations
    document.getElementById('player-sprite-canvas').style.animation = '';
    document.getElementById('enemy-sprite-canvas').style.animation = '';
  };
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  initStarfield();
  initTitleScreen();
  window.addEventListener('resize', () => {
    const sf = document.getElementById('starfield');
    sf.width = window.innerWidth;
    sf.height = window.innerHeight;
    if (G.particles) G.particles.resize();
  });
});
</script>
